<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Knowledge Hub · Legal Affairs Department, Government of Dubai</title>
<meta name="description" content="CLPD knowledge hub — primary legislation, key points and FAQ, with a live AI trainer."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --green:#006B3F;--green2:#008549;--green-d:#004d2e;--green-l:#00a85e;
  --gold:#C9913A;--gold2:#dba84e;--gold-l:#f0cc88;--gold-bg:#fdf6e8;
  --sky:#0e6ba8;--sky2:#1488cc;--sky-d:#0a4f7a;--sky-l:#7cc4ef;--sky-bg:#eaf4fb;
  --ink:#0a0e14;--navy:#1c1f2e;--navy2:#12141e;
  --slate:#3a4554;--slate2:#5a6878;--slate3:#8a98aa;--line:#e8ecf1;--line2:#d8dfe7;--amber:#92540a;
  --paper:#f8fafb;--paper2:#f1f4f7;--white:#fff;--red:#c0392b;
  --serif:'Instrument Serif',Georgia,serif;--sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --r:12px;--r-lg:18px;--r-xl:24px;
  --sh:0 2px 4px rgba(10,14,20,.06),0 8px 24px rgba(10,14,20,.06);
  --sh-md:0 4px 8px rgba(10,14,20,.08),0 16px 40px rgba(10,14,20,.08);
}
html{scroll-behavior:smooth}
html,body{color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;background:var(--paper)}
a{color:var(--green2);text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
em{font-style:italic}

.nav{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 3px 14px rgba(0,0,0,.38)}
.nav-in{display:flex;align-items:center;gap:16px;height:62px;max-width:1180px;margin:0 auto;padding:0 24px}
.logos{display:flex;align-items:center;gap:11px;cursor:pointer}
.emblem{width:38px;height:38px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.emblem svg{width:20px;height:24px}
.brand-t{font-family:var(--serif);font-size:18px;color:#fff;line-height:1.05}
.brand-s{font-family:var(--mono);font-size:8.5px;color:rgba(255,255,255,.5);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-top:2px}
.nav-links{display:flex;align-items:center;gap:2px;margin-left:auto}
.nav-link{color:rgba(255,255,255,.82);font-size:12.5px;font-weight:500;padding:8px 11px;border-radius:7px;cursor:pointer;transition:background .15s,color .15s}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-cta{display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:#fff;font-size:12.5px;font-weight:700;padding:9px 15px;border-radius:8px;margin-left:8px;white-space:nowrap}
.nav-cta:hover{background:var(--gold2);color:#fff}
@media(max-width:880px){.brand-s,.nav-link{display:none}.nav-links{margin-left:auto}}

.hero{position:relative;overflow:hidden;background:linear-gradient(160deg,#0a1c2c,#0a0e14 62%);color:#fff}
.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(900px 360px at 78% -10%,rgba(20,136,204,.30),transparent 70%),radial-gradient(700px 320px at 10% 120%,rgba(201,145,58,.12),transparent 70%)}
.hero-in{position:relative;max-width:1180px;margin:0 auto;padding:clamp(40px,7vw,84px) 24px clamp(34px,6vw,64px)}
.eyebrow{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2.4px;text-transform:uppercase;color:var(--sky-l);margin-bottom:16px}
.hero h1{font-family:var(--serif);font-size:clamp(34px,6vw,60px);font-weight:400;line-height:1.02;letter-spacing:-.015em;max-width:16ch}
.hero p{font-size:clamp(15px,2.2vw,18px);color:rgba(255,255,255,.78);max-width:62ch;margin-top:18px;line-height:1.55}
.hero-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}
.btn{display:inline-flex;align-items:center;gap:9px;font-size:14px;font-weight:600;padding:14px 22px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:transform .12s,box-shadow .12s,background .2s}
.btn-pri{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;box-shadow:0 10px 28px rgba(0,133,73,.36)}
.btn-pri:hover{transform:translateY(-1px);color:#fff}
.btn-ghost{background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.2)}
.btn-ghost:hover{background:rgba(255,255,255,.14);color:#fff}
.draft{display:inline-block;margin-bottom:14px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#ffce80;background:rgba(201,145,58,.18);border:1px solid rgba(201,145,58,.4);border-radius:999px;padding:5px 11px}

section{padding:clamp(44px,7vw,72px) 0}
.sec-head{max-width:680px;margin-bottom:30px}
.sec-kicker{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sky);margin-bottom:10px}
.sec-head h2{font-family:var(--serif);font-size:clamp(27px,4.4vw,40px);font-weight:400;letter-spacing:-.01em;line-height:1.08}
.sec-head p{color:var(--slate2);font-size:15px;margin-top:12px;line-height:1.6}
.group-label{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--slate3);margin:6px 0 16px;display:flex;align-items:center;gap:10px}
.group-label:after{content:"";flex:1;height:1px;background:var(--line)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
.law{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.law:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.law:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--sky2),var(--sky-d))}
.law.uae:before{background:linear-gradient(var(--gold),var(--amber))}
.law-top{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.tag{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border-radius:999px;background:var(--paper2);color:var(--slate2);border:1px solid var(--line)}
.tag.yr{background:var(--sky-bg);color:var(--sky-d);border-color:#bcdcf0}
.law.uae .tag.yr{background:var(--gold-bg);color:var(--amber);border-color:#e6d6ad}
.law h3{font-family:var(--serif);font-size:22px;font-weight:400;line-height:1.12;margin-bottom:4px}
.law-sub{font-size:12px;color:var(--slate3);font-weight:500;margin-bottom:12px}
.law p{font-size:13.5px;color:var(--slate);line-height:1.6}
.law ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:7px}
.law li{font-size:12.5px;color:var(--slate2);line-height:1.5;padding-left:18px;position:relative}
.law li:before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;border-radius:2px;background:var(--sky2)}
.law.uae li:before{background:var(--gold)}

.cover{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.lcard{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh)}
.lcard-n{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--green2);letter-spacing:1px;margin-bottom:7px}
.lcard h4{font-family:var(--serif);font-size:18px;font-weight:400;line-height:1.15;margin-bottom:6px}
.lcard p{font-size:12.5px;color:var(--slate2);line-height:1.5}
.lcard-m{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
.lpill{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--slate2);background:var(--paper2);border:1px solid var(--line);border-radius:999px;padding:3px 8px}

.qa-wrap{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden}
.qa{border-bottom:1px solid var(--line)}
.qa:last-child{border-bottom:0}
.qa summary{list-style:none;cursor:pointer;padding:18px 22px;display:flex;align-items:center;gap:14px;font-size:15px;font-weight:600;color:var(--ink)}
.qa summary::-webkit-details-marker{display:none}
.qa summary:hover{background:var(--paper)}
.qa-ic{width:24px;height:24px;flex-shrink:0;border-radius:7px;background:var(--paper2);color:var(--sky);display:grid;place-items:center;font-size:17px;transition:transform .2s,background .2s,color .2s}
.qa[open] .qa-ic{transform:rotate(45deg);background:var(--sky);color:#fff}
.qa-a{padding:0 22px 20px 60px;font-size:14px;color:var(--slate);line-height:1.65}
.qa-a b{color:var(--sky-d);font-weight:650}

.train{background:linear-gradient(135deg,#0d2018,#0a0e14);border-radius:var(--r-xl);padding:clamp(30px,5vw,52px);color:#fff;position:relative;overflow:hidden}
.train:before{content:"";position:absolute;right:-60px;top:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,168,94,.3),transparent 65%)}
.train-in{position:relative;display:flex;align-items:center;gap:34px;flex-wrap:wrap}
.train-tx{flex:1;min-width:280px}
.train .eyebrow{color:var(--sky-l)}
.train h2{font-family:var(--serif);font-size:clamp(26px,4vw,38px);font-weight:400;line-height:1.08;margin-bottom:12px}
.train p{color:rgba(255,255,255,.78);font-size:15px;line-height:1.6;max-width:54ch}

footer{background:var(--navy2);color:rgba(255,255,255,.65);padding:40px 0;font-size:12.5px}
.foot-in{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
.foot-in a{color:rgba(255,255,255,.8)}
.state{padding:80px 24px;text-align:center;color:var(--slate2);font-size:15px}
</style>
</head>
<body>

<nav class="nav"><div class="nav-in">
  <div class="logos" onclick="location.href='/'">
    <div class="emblem"><svg viewBox="0 0 20 24" fill="none"><path d="M10 1l8 4v6c0 5-3.5 9-8 11-4.5-2-8-6-8-11V5l8-4z" fill="#fff" opacity=".95"/></svg></div>
    <div><div class="brand-t" id="navTitle">Knowledge Hub</div><div class="brand-s">Dubai Legal Affairs Department · CLPD</div></div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="#legislation">Legislation</a>
    <a class="nav-link" href="#cover">What you'll cover</a>
    <a class="nav-link" href="#qa">Q&amp;A</a>
    <a class="nav-cta" id="navCta" href="#train">🎓 AI Training</a>
  </div>
</div></nav>

<div id="app"><div class="state">Loading the knowledge hub…</div></div>

<script src="runtime-config.js"></script>
<script>
(function(){
  'use strict';
  function base(){ return ((window.LAD_API_BASE)||'').replace(/\/$/,''); }
  function tok(){ try{ return localStorage.getItem('lad_token')||''; }catch(e){ return ''; } }
  function param(k){ try{ return new URLSearchParams(location.search).get(k)||''; }catch(e){ return ''; } }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);}); }
  // FAQ answers are authored HTML (bold tags etc.) by trusted admins; allow a safe subset.
  function safeHtml(s){ return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/&lt;(\/?(?:b|i|em|strong))&gt;/g,'<$1>'); }

  var course = param('course') || 'aviation-law';
  var app = document.getElementById('app');

  if(!base()){ app.innerHTML='<div class="state">This hub needs the live backend. Set the API base in runtime-config.js.</div>'; return; }

  var headers = { 'Accept':'application/json' };
  var t = tok(); if(t) headers['Authorization'] = 'Bearer '+t;

  fetch(base()+'/api/v1/hubs/'+encodeURIComponent(course), { headers: headers })
    .then(function(r){ if(r.status===404) throw new Error('notfound'); if(!r.ok) throw new Error('http'); return r.json(); })
    .then(render)
    .catch(function(e){
      app.innerHTML = '<div class="state">'+(e.message==='notfound'
        ? 'This knowledge hub isn’t published yet.'
        : 'We couldn’t load this hub right now. Please try again shortly.')+'</div>';
    });

  function lawCard(d){
    var uae = (d.group==='uae');
    var li = (d.points||[]).map(function(x){ return '<li>'+esc(x)+'</li>'; }).join('');
    return '<div class="law'+(uae?' uae':'')+'">'
      + '<div class="law-top">'+(d.year?'<span class="tag yr">'+esc(d.year)+'</span>':'')+(d.tag?'<span class="tag">'+esc(d.tag)+'</span>':'')+'</div>'
      + '<h3>'+esc(d.title)+'</h3>'+(d.subtitle?'<div class="law-sub">'+esc(d.subtitle)+'</div>':'')
      + (d.summary?'<p>'+esc(d.summary)+'</p>':'')+(li?'<ul>'+li+'</ul>':'')+'</div>';
  }

  function render(h){
    document.title = (h.title||'Knowledge Hub')+' · Legal Affairs Department';
    if(h.title) document.getElementById('navTitle').textContent = h.title.length>26 ? course : h.title;
    var ctaUrl = h.cta_url || '#train';
    var ctaLabel = h.cta_label || 'Start the AI Training';
    document.getElementById('navCta').setAttribute('href', ctaUrl);

    var intl = (h.legislation||[]).filter(function(d){ return d.group!=='uae'; });
    var uae  = (h.legislation||[]).filter(function(d){ return d.group==='uae'; });
    var lessons = h.lessons||[];
    var faq = h.faq||[];

    var legHtml = '';
    if(intl.length || uae.length){
      legHtml = '<section id="legislation"><div class="wrap">'
        + '<div class="sec-head"><div class="sec-kicker">Primary legislation</div>'
        + '<h2>The legal framework</h2><p>The conventions and statutes that govern this area — the authoritative sources, which should be checked before being relied upon.</p></div>'
        + (intl.length?'<div class="group-label">International conventions</div><div class="cards">'+intl.map(lawCard).join('')+'</div>':'')
        + (uae.length?'<div class="group-label" style="margin-top:26px">UAE legislation</div><div class="cards">'+uae.map(lawCard).join('')+'</div>':'')
        + '</div></section>';
    }

    var coverHtml = '';
    if(lessons.length){
      coverHtml = '<section id="cover" style="background:var(--paper2)"><div class="wrap">'
        + '<div class="sec-head"><div class="sec-kicker">In the training</div><h2>What you’ll cover</h2>'
        + '<p>The AI trainer takes you through these one-to-one, checking your understanding as you go.</p></div>'
        + '<div class="cover">'+lessons.map(function(L,i){
            var m=[]; if(L.duration_min) m.push('~'+L.duration_min+' min'); if(L.cpd_points) m.push(L.cpd_points+' CPD'); if((L.objectives||[]).length) m.push((L.objectives.length)+' key points');
            return '<div class="lcard"><div class="lcard-n">'+(i<9?'0':'')+(i+1)+'</div><h4>'+esc(L.title)+'</h4>'
              + (L.summary?'<p>'+esc(L.summary)+'</p>':'')
              + (m.length?'<div class="lcard-m">'+m.map(function(x){return '<span class="lpill">'+esc(x)+'</span>';}).join('')+'</div>':'')+'</div>';
          }).join('')+'</div></div></section>';
    }

    var qaHtml = '';
    if(faq.length){
      qaHtml = '<section id="qa"><div class="wrap" style="max-width:860px">'
        + '<div class="sec-head"><div class="sec-kicker">Frequently asked</div><h2>Quick answers</h2></div>'
        + '<div class="qa-wrap">'+faq.map(function(q){
            return '<details class="qa"><summary><span class="qa-ic">+</span>'+esc(q.q)+'</summary><div class="qa-a">'+safeHtml(q.a)+'</div></details>';
          }).join('')+'</div></div></section>';
    }

    app.innerHTML =
      '<header class="hero"><div class="hero-in">'
        + (h.published?'':'<span class="draft">Draft preview · not yet published</span>')
        + (h.eyebrow?'<div class="eyebrow">'+esc(h.eyebrow)+'</div>':'')
        + '<h1>'+esc(h.title||'Knowledge Hub')+'</h1>'
        + (h.intro?'<p>'+esc(h.intro)+'</p>':'')
        + '<div class="hero-cta"><a class="btn btn-pri" href="'+esc(ctaUrl)+'">🎓 '+esc(ctaLabel)+'</a>'
        + ((intl.length||uae.length)?'<a class="btn btn-ghost" href="#legislation">Browse the legislation</a>':'')+'</div>'
      + '</div></header>'
      + legHtml + coverHtml + qaHtml
      + '<section id="train"><div class="wrap"><div class="train"><div class="train-in"><div class="train-tx">'
        + '<div class="eyebrow">Live AI Trainer</div><h2>Learn it one-to-one with the AI trainer</h2>'
        + '<p>A photoreal trainer takes you through the material — teaching, checking your understanding, and tracking your CPD. About an hour, with a scored assessment.</p></div>'
        + '<div><a class="btn btn-pri" href="'+esc(ctaUrl)+'" style="font-size:15px;padding:16px 28px">🎓 '+esc(ctaLabel)+' →</a></div>'
      + '</div></div></div></section>'
      + '<footer><div class="wrap foot-in"><div>© Government of Dubai · Legal Affairs Department — CLPD</div>'
        + '<div><a href="'+esc(ctaUrl)+'">AI Training</a> &nbsp;·&nbsp; <a href="/">Platform</a></div></div></footer>';
  }
})();
</script>
</body>
</html>
