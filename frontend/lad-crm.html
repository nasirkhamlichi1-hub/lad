<!doctype html>
<html lang="en">
<head>
<script src="lad-admin-guard.js" data-roles="lad_admin,lad_intelligence,lad_super_admin,super_admin,dg"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CLPD CRM — Legal Affairs Department</title>
<style>
  :root{--ink:#0f1b15;--green:#006B3F;--green-l:#00935a;--gold:#C9913A;--bg:#f4f6f5;--card:#fff;
        --line:#e6ebe8;--line2:#d6ded9;--slate:#3a4a42;--slate2:#69786f;--slate3:#9aa8a0;
        --red:#d0432e;--amber:#c17d1c;--blue:#22577a;--rail:#0c1712;
        --sh:0 1px 2px rgba(10,30,20,.05),0 6px 20px rgba(10,30,20,.06);--sh2:0 20px 60px rgba(10,30,20,.16);}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;display:flex;overflow:hidden}
  .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace}
  a{color:var(--green);text-decoration:none}
  button{font-family:inherit}
  /* ── rail ── */
  .rail{width:74px;background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;flex-shrink:0;z-index:30}
  .rail .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--green),var(--green-l));display:grid;place-items:center;font-weight:800;color:#fff;font-size:13px;margin-bottom:10px}
  .rl{width:54px;height:54px;border-radius:13px;display:grid;place-items:center;gap:3px;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;border:none;background:none}
  .rl svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  .rl span{font-size:8.5px;letter-spacing:.3px;font-weight:600}
  .rl:hover{color:#fff;background:rgba(255,255,255,.06)}
  .rl.on{color:#fff;background:linear-gradient(135deg,rgba(0,147,90,.35),rgba(0,107,63,.2));box-shadow:inset 0 0 0 1px rgba(0,147,90,.5)}
  .rl .badge{position:absolute;top:8px;right:9px;min-width:16px;height:16px;background:var(--red);border-radius:9px;font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 4px}
  .rl.has .badge{display:flex}
  .rail-sp{flex:1}
  .rail-div{width:34px;height:1px;background:rgba(255,255,255,.12);margin:6px 0}
  .rail{overflow-y:auto;overflow-x:hidden;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}
  .embed{flex:1;width:100%;height:100%;border:0;display:block;background:#fff}
  /* ── main ── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
  .topbar{height:60px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 22px;flex-shrink:0}
  .topbar h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.01em}
  .topbar .sub{font-size:11px;color:var(--slate3);margin-top:1px}
  .cmd{flex:1;max-width:540px;position:relative}
  .cmd input{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:11px;padding:10px 14px 10px 38px;font-size:13.5px;outline:none}
  .cmd input:focus{border-color:var(--green);background:#fff}
  .cmd svg{position:absolute;left:13px;top:11px;width:16px;height:16px;stroke:var(--slate3);fill:none;stroke-width:2}
  .cmd-res{position:absolute;top:46px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh2);max-height:420px;overflow-y:auto;z-index:60;display:none}
  .cmd-res.on{display:block}
  .who{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12.5px}
  .who .av{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px}
  .who a{color:var(--slate3);font-size:11px}
  .view{flex:1;overflow:hidden;display:none}
  .view.on{display:flex}
  .scroll{overflow-y:auto;height:100%}
  /* ── shared bits ── */
  .av{border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:700;flex-shrink:0}
  .pill{font-size:9.5px;font-weight:700;letter-spacing:.4px;padding:2px 8px;border-radius:7px;text-transform:uppercase;white-space:nowrap;display:inline-block}
  .pill.open{background:#fdf0dc;color:var(--amber)} .pill.pending{background:#e3f5ec;color:var(--green)}
  .pill.resolved,.pill.closed{background:#eef2f0;color:var(--slate2)} .pill.high{background:#fce8e4;color:var(--red)}
  .pill.cat{background:#e9f1f8;color:var(--blue)} .pill.esc{background:#fce8e4;color:var(--red)} .pill.ai{background:#e3f5ec;color:var(--green)}
  .pill.compliant{background:#e3f5ec;color:var(--green)} .pill.atrisk{background:#fdf0dc;color:var(--amber)} .pill.critical{background:#fce8e4;color:var(--red)} .pill.non{background:#eef2f0;color:var(--slate2)}
  .btn{border:none;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-g{background:var(--green);color:#fff} .btn-g:hover{background:var(--green-l)}
  .btn-l{background:#fff;color:var(--slate);border:1px solid var(--line2)} .btn-l:hover{border-color:var(--green);color:var(--green)}
  .btn-r{background:#fff;color:var(--red);border:1px solid #f1c4ba} .btn-r:hover{background:#fdf2f0}
  .btn-xs{padding:5px 10px;font-size:11px;border-radius:7px}
  .inp{width:100%;box-sizing:border-box;padding:9px 12px;border:1.5px solid var(--line2);border-radius:9px;font-size:13px;outline:none;font-family:inherit;background:#fff}
  .inp:focus{border-color:var(--green)}
  .empty{padding:40px 22px;text-align:center;color:var(--slate3);font-size:13px}
  .ey{font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);font-weight:700}
  /* dashboard */
  .dash{padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-content:start}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
  .kpi .l{font-size:9.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--slate3);font-weight:700}
  .kpi .v{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-top:6px}
  .kpi .s{font-size:11.5px;color:var(--slate2);margin-top:3px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
  .panel-hd{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .panel-hd h2{margin:0;font-size:15px;font-weight:700}
  .panel-bd{overflow-y:auto}
  .row{padding:12px 18px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:12px}
  .row:hover{background:var(--bg)}
  .row .ttl{font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .sub{font-size:11.5px;color:var(--slate2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .seg{display:flex;gap:6px;margin-left:auto}
  .seg button{background:var(--bg);border:1px solid var(--line);color:var(--slate);border-radius:18px;padding:5px 13px;font-size:11.5px;cursor:pointer}
  .seg button.on{background:var(--green);border-color:var(--green);color:#fff}
  /* inbox master-detail */
  .inbox{display:flex;width:100%;height:100%}
  .inbox-list{width:380px;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;background:var(--card)}
  .inbox-thread{flex:1;display:flex;flex-direction:column;background:var(--bg)}
  .conv{align-items:flex-start}
  .conv.active{background:#eef5f1;box-shadow:inset 3px 0 0 var(--green)}
  /* AI box */
  .ai{background:linear-gradient(135deg,#0c1712,#10241a);color:#fff;border-radius:16px;padding:18px;box-shadow:var(--sh)}
  .ai textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;resize:vertical;font-family:inherit;outline:none}
  .ai .ans{font-size:13px;line-height:1.6;margin-top:11px;white-space:pre-wrap}
  /* drawer */
  .drawer{position:fixed;top:0;right:0;height:100vh;width:560px;max-width:100vw;background:#fff;box-shadow:var(--sh2);transform:translateX(103%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:200;display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .scrim{position:fixed;inset:0;background:rgba(8,16,12,.45);z-index:190;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.on{opacity:1;pointer-events:auto}
  .dw-bd{flex:1;overflow-y:auto}
  .hero{background:linear-gradient(135deg,#0c1712 0%,#10241a 55%,#0e3322 100%);color:#fff;padding:22px;position:relative}
  .hero .x{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.16);border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:17px}
  .hero-name{font-size:23px;font-weight:700;letter-spacing:-.015em;line-height:1.1}
  .hero-sub{font-size:12.5px;color:rgba(255,255,255,.62);margin-top:3px}
  .hbadge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-top:10px}
  .prog-l{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.6);margin:16px 0 6px;font-family:'JetBrains Mono',monospace;letter-spacing:.4px}
  .prog{height:8px;background:rgba(255,255,255,.16);border-radius:5px;overflow:hidden}.prog>div{height:100%;border-radius:5px;transition:width .7s}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 22px;border-bottom:1px solid var(--line)}
  .tile{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
  .tile .l{font-size:8.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--slate3);font-weight:700}.tile .v{font-size:21px;font-weight:700;margin-top:3px}
  .qa{display:flex;gap:8px;padding:14px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .qa button{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line2);border-radius:10px;padding:9px 13px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink)}
  .qa button:hover{border-color:var(--green);color:var(--green)}
  .qa button.p{background:var(--green);border-color:var(--green);color:#fff}
  .tabs{display:flex;gap:2px;padding:12px 22px 0;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 13px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--slate2);white-space:nowrap}
  .tab.on{border-bottom-color:var(--green);color:var(--ink)}
  .sec{padding:18px 22px}
  .sec h4{font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:0 0 13px}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}.kv .k{color:var(--slate2)}
  .bk{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px}
  .bk-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .bk-acts{display:flex;gap:6px;flex-wrap:wrap}
  .tl{position:relative;padding-left:24px}.tl:before{content:'';position:absolute;left:7px;top:5px;bottom:8px;width:2px;background:var(--line)}
  .tl-i{position:relative;padding:0 0 15px}.tl-d{position:absolute;left:-24px;top:0;width:17px;height:17px;border-radius:50%;background:#fff;border:2px solid var(--green);display:grid;place-items:center;font-size:9px}
  .tl-t{font-size:12.8px;line-height:1.4}.tl-w{font-size:10.5px;color:var(--slate3);font-family:'JetBrains Mono',monospace;margin-top:1px}
  .msg{max-width:82%;padding:10px 14px;border-radius:13px;font-size:13.5px;line-height:1.45;margin-bottom:10px}
  .msg.them{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
  .msg.me{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .msg .who2{font-size:10px;opacity:.7;margin-bottom:2px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:11px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:all .3s;box-shadow:var(--sh2)}
  .toast.on{transform:translateX(-50%) translateY(0);opacity:1}
  .task{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .task input{margin-top:2px}
  .task.done span{text-decoration:line-through;color:var(--slate3)}
  .ib-back{display:none}
  /* ─────────────── MOBILE ─────────────── */
  @media (max-width:768px){
    body{overflow:auto}
    /* Left rail becomes a fixed, swipeable bottom tab bar */
    .rail{position:fixed;bottom:0;left:0;right:0;top:auto;width:auto;height:58px;flex-direction:row;align-items:stretch;padding:0;gap:0;overflow-x:auto;overflow-y:hidden;border-top:1px solid rgba(255,255,255,.1);z-index:150;-webkit-overflow-scrolling:touch}
    .rail .logo,.rail-div,.rail-sp{display:none}
    .rl{flex:0 0 62px;height:58px;border-radius:0;gap:4px}
    .rl svg{width:19px;height:19px}
    .rl span{font-size:8px}
    .rl .badge{top:6px;right:14px}
    .main{height:100vh;padding-bottom:58px}
    .topbar{height:54px;gap:10px;padding:0 12px}
    .topbar h1{font-size:15px}.topbar .sub{display:none}
    .cmd{max-width:none}
    .cmd input{padding:9px 12px 9px 34px;font-size:16px}/* 16px stops iOS zoom-on-focus */
    .cmd svg{top:10px}
    .who .av{width:30px;height:30px}.who>div:last-child{display:none}
    .dash{grid-template-columns:repeat(2,1fr);gap:12px;padding:14px}
    .dash>[style*="span 2"]{grid-column:1 / -1 !important}
    .dash .panel[style*="min-height"]{min-height:0 !important}
    .kpi{padding:13px 14px}.kpi .v{font-size:26px}
    /* Inbox: master list, then full-screen thread with a Back affordance */
    .inbox{flex-direction:column}
    .inbox-list{width:100%;border-right:0;border-bottom:1px solid var(--line)}
    .inbox.show-thread .inbox-list{display:none}
    .inbox-thread{display:none}
    .inbox.show-thread .inbox-thread{display:flex}
    .ib-back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--green);font-weight:700;font-size:13px;cursor:pointer;padding:0 0 8px}
    #v-cust .scroll,#v-ops .scroll{padding:14px !important}
    #v-cust .panel,#v-ops .panel{max-width:none !important}
    #v-cust .panel-hd,#v-ops .panel-hd{flex-wrap:wrap}
    #custSearch,#opsSearch{max-width:none !important;margin-left:0 !important;width:100%}
    /* Record drawer goes full-screen */
    .drawer{width:100%}
    .tiles{grid-template-columns:repeat(3,1fr);padding:14px}
    .qa{padding:12px 16px}.sec{padding:16px}
  }
</style>
</head>
<body>
  <nav class="rail">
    <div class="logo">LAD</div>
    <button class="rl on" data-v="dash" onclick="go('dash')" style="position:relative"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Home</span></button>
    <button class="rl" data-v="inbox" id="railInbox" onclick="go('inbox')" style="position:relative"><span class="badge" id="inboxBadge">0</span><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Inbox</span></button>
    <button class="rl" data-v="cust" onclick="go('cust')"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="18" cy="9" r="3"/></svg><span>Customers</span></button>
    <button class="rl" data-v="ops" onclick="go('ops')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Operations</span></button>
    <div class="rail-div"></div>
    <!-- Everyday operations — all LAD admins -->
    <button class="rl" data-v="courses" onclick="go('courses')"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Courses</span></button>
    <button class="rl" data-v="trainer" onclick="go('trainer')"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><span>Trainer</span></button>
    <button class="rl" id="railUsers" data-v="users" onclick="go('users')"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg><span>Users</span></button>
    <div class="rail-sp"></div>
    <!-- Strategic oversight — super users only -->
    <button class="rl" id="railAccred" data-v="accred" onclick="go('accred')" style="display:none"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.5 13.5 17 22l-5-3-5 3 1.5-8.5"/></svg><span>Accredit</span></button>
    <button class="rl" id="railIntel" data-v="intel" onclick="go('intel')" style="display:none"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg><span>Intel</span></button>
    <a class="rl" id="railCmd" href="command-centre.html" target="_blank" style="display:none"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20"/></svg><span>Command</span></a>
    <button class="rl" onclick="signOut()" title="Sign out"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Sign out</span></button>
  </nav>

  <div class="main">
    <div class="topbar">
      <div><h1 id="vTitle">Dashboard</h1><div class="sub" id="vSub">CLPD customer operations</div></div>
      <div class="cmd"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input id="cmd" placeholder="Search anyone or anything — lawyer, firm, course…" autocomplete="off" oninput="cmdSearch()" onfocus="cmdSearch()"/>
        <div class="cmd-res" id="cmdRes"></div>
      </div>
      <div class="who"><div class="av" id="meAv" style="background:#006B3F">··</div><div><b id="meName">—</b><br><span id="meRole" style="color:var(--slate3);font-size:11px">CLPD Admin</span></div></div>
    </div>

    <!-- DASHBOARD -->
    <div class="view on" id="v-dash"><div class="scroll" style="width:100%"><div class="dash" id="dashGrid"></div></div></div>

    <!-- INBOX -->
    <div class="view" id="v-inbox"><div class="inbox">
      <div class="inbox-list">
        <div class="panel-hd"><h2>Inbox</h2><div class="seg" id="ibSeg">
          <button class="on" onclick="ibBox('unassigned',this)">Unassigned</button>
          <button onclick="ibBox('mine',this)">Mine</button>
          <button onclick="ibBox('all',this)">All</button></div></div>
        <div class="panel-bd" id="ibList" style="flex:1"></div>
      </div>
      <div class="inbox-thread" id="ibThread"><div class="empty">Select a conversation to read and reply.</div></div>
    </div></div>

    <!-- CUSTOMERS -->
    <div class="view" id="v-cust"><div class="scroll" style="width:100%;padding:22px">
      <div class="panel" style="max-width:900px;margin:0 auto"><div class="panel-hd"><h2>Customers</h2>
        <input class="inp" id="custSearch" placeholder="Search a lawyer or firm…" style="max-width:340px;margin-left:auto" oninput="custSearch()"/></div>
        <div class="panel-bd" id="custList" style="max-height:none"><div class="empty">Search above, or browse firms below.</div></div>
      </div>
    </div></div>

    <!-- OPERATIONS -->
    <div class="view" id="v-ops"><div class="scroll" style="width:100%;padding:22px">
      <div class="panel" style="max-width:900px;margin:0 auto"><div class="panel-hd"><h2>Upcoming sessions</h2>
        <input class="inp" id="opsSearch" placeholder="Filter course…" style="max-width:280px;margin-left:auto" oninput="renderOps()"/></div>
        <div class="panel-bd" id="opsList" style="max-height:none"></div>
      </div>
    </div></div>

    <!-- EMBEDDED ADMIN MODULES — same shell, one navigation, no page-hopping -->
    <div class="view" id="v-courses"><iframe class="embed" title="Courses" data-src="lad-admin.html?embed=1"></iframe></div>
    <div class="view" id="v-accred"><iframe class="embed" title="Accreditation" data-src="lad-accreditation-review.html?embed=1"></iframe></div>
    <div class="view" id="v-trainer"><iframe class="embed" title="Trainer" data-src="lad-trainer-admin.html?embed=1"></iframe></div>
    <div class="view" id="v-users"><iframe class="embed" title="Users" data-src="users-admin.html?embed=1"></iframe></div>
    <div class="view" id="v-intel"><iframe class="embed" title="Intelligence" data-src="lad-intelligence-v4.html?embed=1"></iframe></div>
  </div>

  <div class="scrim" id="scrim" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer"><div id="dwInner"></div></div>
  <div class="toast" id="toast"></div>

<script src="runtime-config.js"></script>
<script>
(function(){
  'use strict';
  var BASE=(window.LAD_API_BASE||(window.LAD_SYNC&&window.LAD_SYNC.base)||'https://lad-clpd-backend.onrender.com').replace(/\/$/,'');
  function tok(){try{return localStorage.getItem('lad_token')||''}catch(e){return''}}
  var ME=(function(){try{return JSON.parse(atob(tok().split('.')[1].replace(/-/g,'+').replace(/_/g,'/')))}catch(e){return{}}})();
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
  function q1(s){return String(s||'').replace(/'/g,"\\'")}
  function api(p,o){return fetch(BASE+p,Object.assign({headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok()}},o||{})).then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.message||j.error||('HTTP '+r.status));return j})})}
  function num(n){return (Number(n)||0).toLocaleString('en-US')}
  function ago(iso){if(!iso)return'';var t=Date.parse(String(iso).replace(' ','T'));if(isNaN(t))return'';var s=Math.max(0,(Date.now()-t)/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
  function fdate(iso){if(!iso)return'—';var d=new Date(iso);if(isNaN(d))return String(iso).slice(0,16);var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getUTCDate()+' '+M[d.getUTCMonth()]+' '+d.getUTCFullYear()}
  function fdatetime(iso){var d=new Date(iso);if(isNaN(d))return fdate(iso);return fdate(iso)+' · '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')}
  function initials(n){return String(n||'?').replace(/[^A-Za-z ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0]}).join('').toUpperCase()||'?'}
  function avColor(n){var h=0;String(n||'x').split('').forEach(function(c){h=c.charCodeAt(0)+((h<<5)-h)});return 'hsl('+(Math.abs(h)%360)+',42%,40%)'}
  function lawStatus(pts,prac){if(prac===false)return{label:'Non-practising',cls:'non',color:'#cbd5cd'};if(pts>=16)return{label:'Compliant',cls:'compliant',color:'#3df0a0'};if(pts>=8)return{label:'At risk',cls:'atrisk',color:'#ffc875'};return{label:'Critical',cls:'critical',color:'#ff9aac'}}
  // Inline SVG icons — clean, monochrome, premium (no emoji).
  var ICONS={cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/>',note:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/>',task:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',card:'<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>',firm:'<rect x="4" y="3" width="16" height="18" rx="1"/><line x1="9" y1="9" x2="9" y2="9.01"/><line x1="15" y1="9" x2="15" y2="9.01"/><line x1="9" y1="13" x2="9" y2="13.01"/><line x1="15" y1="13" x2="15" y2="13.01"/>',spark:'<path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/>',refund:'<polyline points="3 7 3 13 9 13"/><path d="M3.5 13a9 9 0 1 0 2-7.7"/>',people:'<circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>',send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/>'};
  function ico(n,sz){return '<svg viewBox="0 0 24 24" width="'+(sz||15)+'" height="'+(sz||15)+'" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0">'+(ICONS[n]||'')+'</svg>'}
  function tlColor(k){return{message_in:'#22577a',reply_out:'#006B3F',ai_reply:'#7a5cff',escalation:'#d0432e',assignment:'#22577a',status_change:'#69786f',booking:'#006B3F',attended:'#006B3F',credit_purchase:'#C9913A',note:'#69786f',task:'#C9913A'}[k]||'#9aa8a0'}
  var toastT;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on')},2800)}
  window.crmToast=toast;

  if(!tok()){document.body.innerHTML='<div style="margin:auto;text-align:center;font-size:15px">Please <a href="clpd-portal.html">sign in</a> as a LAD admin.</div>';return}
  // Admin-only. A firm officer / lawyer must never see the CRM (other firms' data).
  var ADMIN_ROLES=['lad_admin','lad_intelligence','lad_super_admin','super_admin','dg'];
  if(ADMIN_ROLES.indexOf(ME.role)===-1){
    var dest=ME.role==='firm_compliance_officer'?'firm-compliance-portal.html':(ME.user_type==='lawyer'||ME.role==='lawyer')?'lawyer-portal-v2.html':'clpd-portal.html';
    document.body.innerHTML='<div style="margin:auto;text-align:center;max-width:420px;font-family:Inter,system-ui,sans-serif"><div style="margin-bottom:12px"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9aa8a0" stroke-width="1.6"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></div><h2 style="margin:0 0 8px">CLPD admin only</h2><p style="color:#69786f;font-size:14px;line-height:1.6">This is the internal CLPD customer-operations console. You\'re signed in as <strong>'+(ME.name||'a portal user')+'</strong>, so you don\'t have access.</p><a href="'+dest+'" style="display:inline-block;margin-top:12px;background:#006B3F;color:#fff;padding:11px 20px;border-radius:10px;font-weight:600;text-decoration:none">Go to your portal →</a></div>';
    document.body.style.display='flex';document.body.style.minHeight='100vh';
    return;
  }
  document.getElementById('meName').textContent=ME.name||'CLPD Admin';
  var av=document.getElementById('meAv');av.textContent=initials(ME.name);av.style.background=avColor(ME.name);
  // Role-scope the rail. Super users (+dg) get Intelligence & Command Centre;
  // lad_intelligence analysts don't manage user accounts.
  var SUPER_ROLES=['lad_super_admin','super_admin','dg'];
  var IS_SUPER=SUPER_ROLES.indexOf(ME.role)!==-1;
  var roleLabel={lad_admin:'LAD Admin',lad_intelligence:'LAD Intelligence',lad_super_admin:'LAD Super User',super_admin:'Super Admin',dg:'Director General'}[ME.role]||'CLPD Admin';
  var rlEl=document.getElementById('meRole');if(rlEl)rlEl.textContent=roleLabel;
  // Accreditation, Intelligence and the Command Centre are strategic-oversight
  // functions — super users only. Everyday admins don't see them.
  if(SUPER_ROLES.indexOf(ME.role)!==-1){['railAccred','railIntel','railCmd'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display=''})}
  if(ME.role==='lad_intelligence'){var ru=document.getElementById('railUsers');if(ru)ru.style.display='none'}

  // ── shared state ──
  var CONV=[],SESS=[],FIRMS=[],TASKS_DUE=[];

  // ── view switching ──
  var TITLES={dash:['Dashboard','CLPD customer operations'],inbox:['Inbox','Customer conversations'],cust:['Customers','Lawyers & firms'],ops:['Operations','Sessions & bookings'],
    courses:['Courses','Catalogue · sessions · scheduling · website'],accred:['Accreditation','Application review queue'],trainer:['Trainer','Staff training materials & learners'],users:['Users','Accounts, roles & access'],intel:['Intelligence','Profession analytics & oversight']};
  var EMBED={courses:1,accred:1,trainer:1,users:1,intel:1};
  // A module is reachable only if its rail entry is visible to this role.
  function viewAllowed(v){var map={accred:'railAccred',intel:'railIntel',users:'railUsers'};var id=map[v];if(!id)return true;var el=document.getElementById(id);return!!el&&el.style.display!=='none'}
  window.go=function(v){
    if(!document.getElementById('v-'+v)||!viewAllowed(v))v='dash';
    try{if(location.hash!=='#'+v)history.replaceState(null,'',location.pathname+location.search+'#'+v)}catch(e){}
    document.querySelectorAll('.rl').forEach(function(r){r.classList.toggle('on',r.getAttribute('data-v')===v)});
    document.querySelectorAll('.view').forEach(function(x){x.classList.remove('on')});
    document.getElementById('v-'+v).classList.add('on');
    document.getElementById('vTitle').textContent=TITLES[v][0];document.getElementById('vSub').textContent=TITLES[v][1];
    if(EMBED[v]){var f=document.querySelector('#v-'+v+' iframe[data-src]');if(f&&!f.getAttribute('src'))f.setAttribute('src',f.getAttribute('data-src'));return}
    if(v==='inbox')renderInbox();if(v==='ops')renderOps();if(v==='cust'&&!document.getElementById('custSearch').value)browseFirms();
  };
  window.signOut=function(){try{localStorage.removeItem('lad_token');localStorage.removeItem('lad_role');localStorage.removeItem('lad_name')}catch(e){}location.replace('clpd-portal.html')};

  // ── command / global search ──
  var cmdT;window.cmdSearch=function(){clearTimeout(cmdT);cmdT=setTimeout(_cmd,240)};
  function _cmd(){
    var qv=(document.getElementById('cmd').value||'').trim();var box=document.getElementById('cmdRes');
    if(qv.length<2){box.classList.remove('on');return}
    box.classList.add('on');box.innerHTML='<div class="empty">Searching…</div>';
    var ql=qv.toLowerCase();var fh=FIRMS.filter(function(f){return (f.name||'').toLowerCase().indexOf(ql)>=0}).slice(0,4);
    var sh=SESS.filter(function(s){return (s.course_title||'').toLowerCase().indexOf(ql)>=0||(s.provider_name||'').toLowerCase().indexOf(ql)>=0}).slice(0,4);
    api('/api/v1/lawyers?search='+encodeURIComponent(qv)+'&limit=10').then(function(j){
      var rows=Array.isArray(j)?j:(j.data||j.rows||[]);var h='';
      if(fh.length)h+=fh.map(function(f){return cmdRow(ico('firm'),f.name,f.id+' · firm','openFirm(\''+q1(f.id)+'\')')}).join('');
      if(sh.length)h+=sh.map(function(s){return cmdRow(ico('cal'),s.course_title||'Session',fdate(s.scheduled_at)+' · '+(Number(s.seats_remaining)||0)+' seats · session','openSession(\''+q1(s.id)+'\',\''+q1(s.course_title||'')+'\')')}).join('');
      h+=rows.map(function(l){var n=((l.first_name||'')+' '+(l.last_name||'')).trim()||l.id;var p=l.points!=null?l.points:(l.lifetime_points||0);return cmdRow(initials(n),n,(l.email||'')+' · '+p+'/16 pts','openLawyer(\''+q1(l.id)+'\',\''+q1(n)+'\')',avColor(n))}).join('');
      box.innerHTML=h||'<div class="empty">No results.</div>';
    }).catch(function(e){box.innerHTML='<div class="empty">'+esc(e.message)+'</div>'});
  }
  function cmdRow(ic,t,s,onclick,avbg){var avh=avbg?'<div class="av" style="width:32px;height:32px;font-size:11px;background:'+avbg+'">'+esc(ic)+'</div>':'<div style="width:32px;text-align:center;font-size:17px">'+ic+'</div>';
    return '<div class="row" onclick="document.getElementById(\'cmdRes\').classList.remove(\'on\');document.getElementById(\'cmd\').value=\'\';'+onclick+'">'+avh+'<div style="flex:1;min-width:0"><div class="ttl">'+esc(t)+'</div><div class="sub">'+esc(s)+'</div></div></div>';}
  document.addEventListener('click',function(e){if(!e.target.closest('.cmd'))document.getElementById('cmdRes').classList.remove('on')});

  // ── dashboard ──
  function loadDash(){
    Promise.all([
      api('/api/v1/messages/conversations?box=all').catch(function(){return{conversations:[]}}),
      api('/api/v1/admin/oversight').catch(function(){return{}}),
      api('/api/v1/tasks?open=1').catch(function(){return{tasks:[]}})
    ]).then(function(r){
      CONV=r[0].conversations||[];var o=r[1]||{};TASKS_DUE=(r[2].tasks||[]);
      var open=CONV.filter(function(c){return c.status!=='closed'&&c.status!=='resolved'}).length;
      var un=CONV.filter(function(c){return !c.assigned_to&&c.status!=='closed'}).length;
      var ib=document.getElementById('inboxBadge');ib.textContent=un;document.getElementById('railInbox').classList.toggle('has',un>0);
      var L=o.lawyers||{},F=o.firms||{};
      var dash=document.getElementById('dashGrid');
      dash.innerHTML=
        kpi('Open conversations',open,un+' unassigned')
        +kpi('Assigned to me',CONV.filter(function(c){return c.assigned_to===ME.sub&&c.status!=='closed'}).length,'your queue')
        +kpi('Upcoming sessions',SESS.length,(SESS.reduce(function(s,x){return s+(Number(x.seats_remaining)||0)},0))+' seats open')
        +kpi('Tasks due',TASKS_DUE.length,'follow-ups')
        +(IS_SUPER?kpiGo('Accreditation','accredPending','awaiting your decision','accred'):'')
        +'<div class="panel" style="grid-column:span 2;min-height:300px"><div class="panel-hd"><h2>Needs attention</h2><button class="btn btn-l btn-xs" style="margin-left:auto" onclick="go(\'inbox\')">Open inbox →</button></div><div class="panel-bd" id="dashQueue" style="flex:1"></div></div>'
        +'<div class="panel" style="grid-column:span 2"><div class="panel-hd"><h2>Tasks due</h2></div><div class="panel-bd" id="dashTasks" style="flex:1;padding:6px 18px"></div></div>'
        +'<div class="ai" style="grid-column:span 2"><div class="ey" style="color:rgba(255,255,255,.6);margin-bottom:9px">✦ Ask Maryam · AI assist</div><textarea id="aiQ" rows="2" placeholder="which firms are most at risk? · summarise today\'s messages · who needs chasing"></textarea><div style="margin-top:9px"><button class="btn btn-g" onclick="askAI()" id="aiBtn">Ask</button></div><div class="ans" id="aiAns"></div></div>'
        +'<div class="panel" style="grid-column:span 2"><div class="panel-hd"><h2>Upcoming sessions</h2><button class="btn btn-l btn-xs" style="margin-left:auto" onclick="go(\'ops\')">All →</button></div><div class="panel-bd" id="dashSess" style="max-height:320px"></div></div>';
      var dq=document.getElementById('dashQueue');var att=CONV.filter(function(c){return c.escalated||(!c.assigned_to&&c.status!=='closed'&&c.status!=='resolved')}).slice(0,7);
      dq.innerHTML=att.length?att.map(convRow).join(''):'<div class="empty">All clear — nothing waiting.</div>';
      var dt=document.getElementById('dashTasks');dt.innerHTML=TASKS_DUE.length?TASKS_DUE.slice(0,8).map(function(t){return '<div class="task"><input type="checkbox" onchange="taskDone(\''+t.id+'\',this.checked)"/><div style="flex:1"><div style="font-size:13px;font-weight:500">'+esc(t.title)+'</div><div class="sub">'+(t.due_at?'Due '+fdate(t.due_at):'')+'</div></div></div>'}).join(''):'<div class="empty">No open tasks.</div>';
      var ds=document.getElementById('dashSess');ds.innerHTML=SESS.slice(0,8).map(sessRow).join('')||'<div class="empty">No upcoming sessions.</div>';
      if(IS_SUPER)loadAccredWidget();
    });
  }
  // Super only — surface the accreditation decision queue on Home.
  function loadAccredWidget(){api('/api/v1/accreditations?status=pending&limit=1').then(function(j){var n=(j.counts&&j.counts.pending)||0;var el=document.getElementById('accredPending');if(!el)return;el.textContent=num(n);el.style.color=n>0?'var(--amber)':'';}).catch(function(){})}
  function kpiGo(l,id,s,view){return '<div class="kpi" style="cursor:pointer" onclick="go(\''+view+'\')" title="Open accreditation review"><div class="l">'+l+'</div><div class="v" id="'+id+'">…</div><div class="s">'+esc(s)+' ›</div></div>'}
  function kpi(l,v,s){return '<div class="kpi"><div class="l">'+l+'</div><div class="v">'+num(v)+'</div><div class="s">'+esc(s)+'</div></div>'}

  // ── conversations ──
  function convRow(c){return '<div class="row conv" onclick="openConv(\''+c.id+'\')"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px"><span class="ttl" style="flex:1">'+esc(c.subject||'(no subject)')+'</span><span class="sub" style="font-family:monospace">'+ago(c.last_message_at)+'</span></div><div class="sub">'+esc(c.preview||'')+'</div><div style="margin-top:6px;display:flex;gap:5px;align-items:center;flex-wrap:wrap"><span class="pill '+esc(c.status)+'">'+esc(c.status)+'</span>'+(c.priority==='high'?'<span class="pill high">high</span>':'')+(c.category?'<span class="pill cat">'+esc(c.category)+'</span>':'')+(c.escalated?'<span class="pill esc">needs human</span>':(c.ai_handled?'<span class="pill ai">Maryam</span>':''))+'<span class="sub" style="flex:1">'+esc(c.requester_name||'')+(c.assigned_name?' · → '+esc(c.assigned_name):'')+'</span>'+(c.assigned_to===ME.sub?'':'<button class="btn btn-l btn-xs" onclick="event.stopPropagation();takeConv(\''+c.id+'\')">Take it</button>')+'</div></div></div>'}
  var IBBOX='unassigned';
  window.ibBox=function(b,el){IBBOX=b;document.querySelectorAll('#ibSeg button').forEach(function(x){x.classList.remove('on')});el.classList.add('on');renderInbox()};
  function renderInbox(){
    var host=document.getElementById('ibList');host.innerHTML='<div class="empty">Loading…</div>';
    api('/api/v1/messages/conversations?box='+IBBOX).then(function(j){
      var rows=j.conversations||[];if(IBBOX==='all')rows=rows.filter(function(c){return c.status!=='closed'});
      host.innerHTML=rows.length?rows.map(convRow).join(''):'<div class="empty">Nothing here.</div>';
    });
  }
  window.takeConv=function(id){api('/api/v1/messages/conversations/'+id+'/assign',{method:'POST',body:JSON.stringify({assigneeId:ME.sub})}).then(function(){toast('✓ You own this');renderInbox();loadDash()}).catch(function(e){toast(e.message)})};
  window.ibBack=function(){var ibx=document.querySelector('.inbox');if(ibx)ibx.classList.remove('show-thread')};
  window.openConv=function(id){
    go('inbox');var ibx=document.querySelector('.inbox');if(ibx)ibx.classList.add('show-thread');document.querySelectorAll('.conv').forEach(function(r){r.classList.remove('active')});
    var th=document.getElementById('ibThread');th.innerHTML='<div class="empty">Loading…</div>';
    api('/api/v1/messages/conversations/'+id).then(function(j){
      var c=j.conversation;
      var head='<div style="padding:16px 22px;border-bottom:1px solid var(--line);background:#fff"><button class="ib-back" onclick="ibBack()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" style="vertical-align:-2px"><polyline points="15 18 9 12 15 6"/></svg> Inbox</button><div style="display:flex;align-items:center;gap:10px"><div><div style="font-size:16px;font-weight:700">'+esc(c.subject||'Conversation')+'</div><div class="sub" style="cursor:pointer" onclick="'+(c.requester_type==='firm'?'openFirm(\''+q1(c.requester_id)+'\')':'openLawyer(\''+q1(c.requester_id)+'\',\''+q1(c.requester_name)+'\')')+'">'+esc(c.requester_name||'')+' · '+esc(c.requester_type||'')+' →</div></div><div style="margin-left:auto;display:flex;gap:6px;align-items:center"><span class="pill '+esc(c.status)+'">'+esc(c.status)+'</span>'+(c.assigned_to===ME.sub?'':'<button class="btn btn-g btn-xs" onclick="takeConv(\''+id+'\');openConv(\''+id+'\')">Take ownership</button>')+(c.status!=='resolved'?'<button class="btn btn-l btn-xs" onclick="convStatus(\''+id+'\',\'resolved\')">Resolve</button>':'')+'</div></div></div>';
      var msgs=(c.messages||[]).map(function(m){var mine=m.sender_side==='admin';return '<div class="msg '+(mine?'me':'them')+'"><div class="who2">'+esc(m.sender_name||(mine?'CLPD':'User'))+' · '+ago(m.created_at)+'</div>'+esc(m.body)+'</div>'}).join('');
      th.innerHTML=head+'<div style="flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column">'+msgs+'</div>'+'<div style="padding:14px 22px;border-top:1px solid var(--line);background:#fff"><textarea id="ibReply" class="inp" rows="2" placeholder="Reply to '+esc(c.requester_name||'')+'…"></textarea><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-l" id="ibDraftBtn" onclick="ibDraft(\''+id+'\')">'+ico('spark')+' Draft with AI</button><button class="btn btn-g" style="margin-left:auto" onclick="ibSend(\''+id+'\')">Send reply</button></div></div>';
    }).catch(function(e){th.innerHTML='<div class="empty">'+esc(e.message)+'</div>'});
  };
  window.ibSend=function(id){var t=document.getElementById('ibReply');var b=(t.value||'').trim();if(!b)return;api('/api/v1/messages/conversations/'+id+'/messages',{method:'POST',body:JSON.stringify({body:b})}).then(function(){openConv(id);renderInbox()}).catch(function(e){toast(e.message)})};
  window.convStatus=function(id,s){api('/api/v1/messages/conversations/'+id+'/status',{method:'POST',body:JSON.stringify({status:s})}).then(function(){toast('✓ '+s);openConv(id);renderInbox();loadDash()}).catch(function(e){toast(e.message)})};

  window.dwNoteSave=function(){var v=(document.getElementById('ntText').value||'').trim();if(!v)return;var b=REC.type==='lawyer'?{lawyer_id:REC.id}:{firm_id:REC.id};b.summary=v;api('/api/v1/messages/activity',{method:'POST',body:JSON.stringify(b)}).then(function(){toast('✓ Note saved');reopenRec()}).catch(function(e){toast(e.message)})};
  window.dwTaskOpen=function(){var f=document.getElementById('dwForm');f.style.display='block';f.innerHTML='<div class="sec" style="padding:14px 0"><h4>New task</h4><input id="tkText" class="inp" placeholder="e.g. Call back re: refund"/><input id="tkDue" type="date" class="inp" style="margin-top:8px"/><div style="margin-top:8px"><button class="btn btn-g" onclick="dwTaskSave()">Add task</button></div></div>'};
  window.dwTaskSave=function(){var v=(document.getElementById('tkText').value||'').trim();if(!v)return;var b=REC.type==='lawyer'?{lawyer_id:REC.id}:{firm_id:REC.id};b.title=v;b.due_at=document.getElementById('tkDue').value||null;api('/api/v1/tasks',{method:'POST',body:JSON.stringify(b)}).then(function(){toast('✓ Task added');reopenRec()}).catch(function(e){toast(e.message)})};
  window.dwCreditsOpen=function(){var f=document.getElementById('dwForm');f.style.display='block';f.innerHTML='<div class="sec" style="padding:14px 0"><h4>Credits · balance '+REC.credits+'</h4><input id="crAmt" type="number" min="1" class="inp" placeholder="Amount of credits"/><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="btn btn-g" onclick="dwCredits(\'grant\')">+ Grant</button><button class="btn btn-l" onclick="dwCredits(\'deduct\')">− Deduct</button><button class="btn btn-r" onclick="dwCredits(\'refund\')">'+ico('refund')+' Refund</button></div><div class="sub" style="margin-top:8px"><strong>Grant</strong> add credits · <strong>Deduct</strong> correct a balance · <strong>Refund</strong> return purchased credits (money back).</div></div>'};
  window.dwCredits=function(mode){var n=Math.abs(parseInt(document.getElementById('crAmt').value,10))||0;if(!n)return;if(!REC.email){toast('No email on file');return}var amt=mode==='grant'?n:-n;var note=mode==='grant'?'Goodwill grant':mode==='refund'?'Credit refund — money returned to customer':'Balance correction';api('/api/v1/credits/topup',{method:'POST',body:JSON.stringify({email:REC.email,credits:amt,note:note})}).then(function(){toast('✓ '+(mode==='grant'?'+':'−')+n+' credits ('+mode+')');reopenRec()}).catch(function(e){toast(e.message)})};

  function tasksHTML(tasks){return tasks.length?tasks.map(function(t){return '<div class="task'+(t.done?' done':'')+'"><input type="checkbox" '+(t.done?'checked':'')+' onchange="taskDone(\''+t.id+'\',this.checked)"/><div style="flex:1"><span style="font-size:13px;font-weight:500">'+esc(t.title)+'</span><div class="sub">'+(t.due_at?'Due '+fdate(t.due_at):'')+(t.created_by_name?' · '+esc(t.created_by_name):'')+'</div></div></div>'}).join(''):'<div class="sub">No tasks. Add one with the  Task action.</div>'}
  window.taskDone=function(id,done){api('/api/v1/tasks/'+id,{method:'PATCH',body:JSON.stringify({done:done})}).then(function(){toast(done?'✓ Done':'Reopened');loadDash()}).catch(function(e){toast(e.message)})};

  window.openFirm=function(id){
    openDrawer();document.getElementById('dwInner').innerHTML='<div class="hero"><button class="x" onclick="closeDrawer()">×</button><div class="hero-name">Loading…</div></div>';
    Promise.all([api('/api/v1/firms/'+id).catch(function(){return{}}),api('/api/v1/firms/'+id+'/lawyers').catch(function(){return[]}),api('/api/v1/firms/'+id+'/transactions').catch(function(){return{transactions:[]}}),api('/api/v1/messages/activity?firm_id='+encodeURIComponent(id)+'&limit=60').catch(function(){return{activity:[]}}),api('/api/v1/tasks?firm_id='+encodeURIComponent(id)).catch(function(){return{tasks:[]}})]).then(function(r){
      var f=r[0]||{},laws=Array.isArray(r[1])?r[1]:(r[1].data||[]),txns=(r[2]&&(r[2].transactions||r[2].data))||[],acts=(r[3].activity)||[],tasks=(r[4].tasks)||[];
      var name=f.name||id;REC={type:'firm',id:id,name:name};
      var comp=laws.length?Math.round(100*laws.filter(function(l){return (l.points||l.lifetime_points||0)>=16}).length/laws.length):0;
      var crit=laws.filter(function(l){return (l.points||l.lifetime_points||0)<8}).length;
      var col=comp>=70?'#3df0a0':comp>=40?'#ffc875':'#ff9aac';
      var tl=acts.map(function(a){return{kind:a.kind,when:a.created_at,text:a.summary,who:a.actor_name}});
      txns.forEach(function(t){tl.push({kind:'credit_purchase',when:t.date||t.created_at,text:(t.description||t.type||'Credit movement')+' ('+(t.credits||t.amount||0)+' cr)'})});
      tl.sort(function(a,b){return String(b.when||'').localeCompare(String(a.when||''))});
      document.getElementById('dwInner').innerHTML=
        '<div class="hero"><button class="x" onclick="closeDrawer()">×</button><div style="display:flex;gap:14px;align-items:flex-start"><div class="av" style="width:56px;height:56px;font-size:20px;border-radius:15px;background:'+avColor(name)+'">'+initials(name)+'</div><div style="flex:1;min-width:0"><div class="hero-name">'+esc(name)+'</div><div class="hero-sub">'+num(laws.length)+' lawyers · '+comp+'% compliant</div><span class="hbadge" style="background:rgba(255,255,255,.14);color:'+col+'">'+(comp>=70?'Healthy':comp>=40?'Watch':'At risk')+'</span></div></div><div class="prog-l"><span>FIRM COMPLIANCE</span><span>'+comp+'%</span></div><div class="prog"><div style="width:'+comp+'%;background:'+col+'"></div></div></div>'
        +'<div class="dw-bd"><div class="tiles"><div class="tile"><div class="l">Lawyers</div><div class="v">'+num(laws.length)+'</div></div><div class="tile"><div class="l">Critical</div><div class="v" style="color:var(--red)">'+num(crit)+'</div></div><div class="tile"><div class="l">Credit pool</div><div class="v">'+num(f.credit_pool||f.pool)+'</div></div></div>'
        +'<div class="qa"><button class="p" onclick="dwMessageOpen()">'+ico('mail')+' Message firm</button><button onclick="dwAiBrief()">'+ico('spark')+' AI brief</button><button onclick="dwNoteOpen()">'+ico('note')+' Note</button><button onclick="dwTaskOpen()">'+ico('task')+' Task</button></div>'
        +'<div id="dwForm" style="display:none;padding:0 22px 14px;border-bottom:1px solid var(--line)"></div>'
        +tabs([{id:'lw',label:'Lawyers ('+laws.length+')'},{id:'tl',label:'Activity'},{id:'tk',label:'Tasks'},{id:'cr',label:'Credits'}])
        +'<div class="sec" data-tab="lw">'+(laws.length?laws.slice(0,80).map(function(l){var n=((l.first_name||'')+' '+(l.last_name||'')).trim()||l.id;var p=l.points!=null?l.points:(l.lifetime_points||0);var s=lawStatus(p,l.practicing!==false);return '<div class="row" style="padding:9px 0" onclick="openLawyer(\''+q1(l.id)+'\',\''+q1(n)+'\')"><div class="av" style="width:30px;height:30px;font-size:11px;background:'+avColor(n)+'">'+initials(n)+'</div><span style="flex:1;font-size:13px">'+esc(n)+'</span><span class="pill '+s.cls+'">'+p+'/16</span></div>'}).join(''):'<div class="sub">No lawyers.</div>')+'</div>'
        +'<div class="sec" data-tab="tl" style="display:none">'+timeline(tl)+'</div>'
        +'<div class="sec" data-tab="tk" style="display:none">'+tasksHTML(tasks)+'</div>'
        +'<div class="sec" data-tab="cr" style="display:none">'+(txns.length?txns.slice(0,30).map(function(t){return '<div class="kv"><span>'+esc(t.description||t.type||'')+'<div class="sub">'+fdatetime(t.date||t.created_at)+'</div></span><span>'+(t.credits||t.amount||0)+' cr</span></div>'}).join(''):'<div class="sub">No transactions.</div>')+'</div>'
        +'</div>';
    });
  };
  function reopenRec(){if(REC.type==='lawyer')openLawyer(REC.id,REC.name);else if(REC.type==='firm')openFirm(REC.id);if(document.getElementById('v-ops').classList.contains('on')||document.getElementById('v-dash').classList.contains('on'))loadSessions().then(loadDash)}

  // ── AI ──
  window.askAI=function(){var qv=(document.getElementById('aiQ').value||'').trim();if(!qv)return;var b=document.getElementById('aiBtn'),a=document.getElementById('aiAns');b.disabled=true;b.textContent='Thinking…';a.textContent='';api('/api/v1/admin/command',{method:'POST',body:JSON.stringify({prompt:qv})}).then(function(j){a.textContent=j.answer||j.summary||JSON.stringify(j);b.disabled=false;b.textContent='Ask'}).catch(function(e){a.textContent='AI unavailable: '+e.message;b.disabled=false;b.textContent='Ask'})};

  // ── drawer ──
  function openDrawer(){document.getElementById('drawer').classList.add('on');document.getElementById('scrim').classList.add('on')}
  window.closeDrawer=function(){document.getElementById('drawer').classList.remove('on');document.getElementById('scrim').classList.remove('on')};
  window.ibDraft=function(id){var b=document.getElementById('ibDraftBtn');if(b){b.disabled=true;b.textContent='Drafting…'}api('/api/v1/messages/conversations/'+id+'/draft',{method:'POST',body:JSON.stringify({})}).then(function(j){var t=document.getElementById('ibReply');if(t&&j.draft){t.value=j.draft;t.focus()}else toast('No draft returned');if(b){b.disabled=false;b.innerHTML=ico('spark')+' Draft with AI'}}).catch(function(e){toast(e.message);if(b){b.disabled=false;b.innerHTML=ico('spark')+' Draft with AI'}})};
  // Keyboard: ⌘K / Ctrl+K focuses the command bar; Esc closes the drawer/results.
  document.addEventListener('keydown',function(e){
    if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();var c=document.getElementById('cmd');if(c){c.focus();c.select()}return}
    if(e.key==='Escape'){closeDrawer();var r=document.getElementById('cmdRes');if(r)r.classList.remove('on')}
    if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='cmd'){var first=document.querySelector('#cmdRes .row');if(first)first.click()}
  });

  // ── boot ──
  api('/api/v1/firms').then(function(j){FIRMS=Array.isArray(j)?j:(j.data||j.firms||[])}).catch(function(){});
  loadSessions().then(loadDash);
  // The Inbox badge (new-message indicator) updates everywhere in the shell —
  // not just on Home — so it's live while you're deep in Courses, Users, etc.
  function refreshInboxBadge(){api('/api/v1/messages/conversations?box=unassigned').then(function(j){var un=(j.conversations||[]).filter(function(c){return c.status!=='closed'}).length;var ib=document.getElementById('inboxBadge');if(ib)ib.textContent=un;var ri=document.getElementById('railInbox');if(ri)ri.classList.toggle('has',un>0)}).catch(function(){})}
  setInterval(function(){if(document.getElementById('v-dash').classList.contains('on'))loadDash();else refreshInboxBadge()},45000);
  // Deep-link / refresh-safe navigation — the URL hash tracks the open module.
  function fromHash(){var h=(location.hash||'').replace(/^#/,'');if(h&&document.getElementById('v-'+h))go(h)}
  window.addEventListener('hashchange',fromHash);
  fromHash();
})();
</script>
</body>
</html>
