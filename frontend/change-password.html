<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change your password · LAD CLPD</title>
<style>
  :root {
    --green:#006B3F; --green2:#004C2D;
    --gold:#C4A66B;
    --ink:#1a1a1a; --slate1:#475569; --slate2:#64748b; --slate3:#94a3b8;
    --line1:#e2e8f0; --line2:#cbd5e1; --bg:#f8fafc;
    --red:#dc2626; --red2:#fef2f2;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border:1px solid var(--line1);border-radius:12px;padding:36px 40px;width:460px;max-width:100%;box-shadow:0 20px 50px rgba(15,23,42,0.08)}
  .crest{display:block;margin:0 auto 18px;height:54px}
  .titles{text-align:center;margin-bottom:28px}
  .titles h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--ink);line-height:1.15}
  .titles .sub{font-size:12px;color:var(--slate2);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;margin-top:6px}
  .lead{font-size:13px;color:var(--slate1);line-height:1.55;margin-bottom:22px;text-align:center}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--slate2);margin-bottom:6px}
  .field input{width:100%;padding:11px 14px;border:1px solid var(--line2);border-radius:6px;font-size:14px;font-family:var(--sans)}
  .field input:focus{outline:none;border-color:var(--green)}
  .strength{height:4px;background:var(--line1);border-radius:3px;margin-top:8px;overflow:hidden}
  .strength .bar{height:100%;width:0;background:var(--red);transition:all 0.2s}
  .strength.weak .bar{width:25%;background:var(--red)}
  .strength.ok .bar{width:55%;background:#d97706}
  .strength.good .bar{width:80%;background:var(--green)}
  .strength.strong .bar{width:100%;background:var(--green)}
  .rules{font-size:11px;color:var(--slate2);margin-top:8px;line-height:1.5}
  .rules .ok{color:var(--green)}
  .btn{display:block;width:100%;padding:12px;border-radius:6px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:var(--green);color:#fff;margin-top:8px}
  .btn:hover:not(:disabled){background:var(--green2)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .err{font-size:13px;color:var(--red);background:var(--red2);border:1px solid #fecaca;border-radius:6px;padding:10px 12px;margin-bottom:16px}
  .ok-msg{font-size:13px;color:#065f46;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:6px;padding:10px 12px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <img class="crest" alt="Dubai Government" src="img/dubai-logo.svg" onerror="this.style.display='none'">
  <div class="titles">
    <h1>Set your password</h1>
    <div class="sub">Continuing Legal Professional Development</div>
  </div>
  <p class="lead">Welcome — please set a personal password before you continue. This screen only appears once.</p>

  <div id="errBox" class="err" style="display:none"></div>
  <div id="okBox" class="ok-msg" style="display:none">Password updated. Signing you in…</div>

  <form id="pwForm" onsubmit="return submitForm(event)">
    <div class="field">
      <label for="oldPw">Current (temporary) password</label>
      <input type="password" id="oldPw" autocomplete="current-password" required>
    </div>
    <div class="field">
      <label for="newPw">New password</label>
      <input type="password" id="newPw" autocomplete="new-password" required oninput="updateStrength()">
      <div class="strength" id="strength"><div class="bar"></div></div>
      <div class="rules" id="rules">
        <span data-rule="len">• 10+ characters</span> ·
        <span data-rule="upper">uppercase letter</span> ·
        <span data-rule="lower">lowercase letter</span> ·
        <span data-rule="digit">digit</span>
      </div>
    </div>
    <div class="field">
      <label for="confirmPw">Confirm new password</label>
      <input type="password" id="confirmPw" autocomplete="new-password" required>
    </div>
    <button class="btn" type="submit" id="submitBtn">Set password & continue</button>
  </form>
</div>

<script src="runtime-config.js?v=render2"></script>
<script src="api-client.js?v=render2"></script>
<script>
(function () {
  'use strict';

  // Must be authenticated — anyone landing here without a token gets bounced
  if (!window.LAD || !window.LAD.isAuthenticated()) {
    window.location.href = 'index.html';
    return;
  }

  window.updateStrength = function () {
    const pw = document.getElementById('newPw').value;
    const checks = {
      len: pw.length >= 10,
      upper: /[A-Z]/.test(pw),
      lower: /[a-z]/.test(pw),
      digit: /[0-9]/.test(pw),
    };
    let passed = 0;
    Object.entries(checks).forEach(([k, ok]) => {
      const span = document.querySelector(`[data-rule="${k}"]`);
      if (span) span.classList.toggle('ok', ok);
      if (ok) passed++;
    });
    const bar = document.getElementById('strength');
    bar.className = 'strength ' + (passed <= 1 ? 'weak' : passed === 2 ? 'ok' : passed === 3 ? 'good' : 'strong');
  };

  window.submitForm = async function (e) {
    e.preventDefault();
    const errBox = document.getElementById('errBox');
    const okBox = document.getElementById('okBox');
    errBox.style.display = 'none';
    okBox.style.display = 'none';

    const oldPw = document.getElementById('oldPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;

    if (newPw !== confirm) {
      errBox.textContent = 'New password and confirmation don\'t match';
      errBox.style.display = '';
      return false;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      await window.LAD.changeMyPassword(oldPw, newPw);
      okBox.style.display = '';
      // Redirect to role-appropriate portal
      const role = (() => { try { return localStorage.getItem('lad_role') || ''; } catch (_) { return ''; }})();
      const dest = role === 'lawyer' ? 'lawyer-portal-v2.html'
                 : role === 'firm_compliance_officer' ? 'firm-compliance-portal.html'
                 : role === 'lad_intelligence' ? 'lad-crm.html'
                 : (role === 'lad_admin' || role === 'lad_super_admin' || role === 'super_admin') ? 'lad-crm.html'
                 : 'router.html';
      setTimeout(() => { window.location.href = dest; }, 800);
    } catch (e) {
      errBox.textContent = e.message || 'Could not update password';
      errBox.style.display = '';
      btn.disabled = false; btn.textContent = 'Set password & continue';
    }
    return false;
  };
})();
</script>
</body>
</html>
