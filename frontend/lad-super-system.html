<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LAD Platform · Routing… · Legal Affairs Department</title>
<!--
  This file used to be a 14k-line bundle of four portals in one. Every
  feature it contained now lives in its own standalone file:
    - Lawyer portal    → lawyer-portal-v2.html
    - Firm portal      → firm-compliance-portal.html
    - LAD admin / super → lad-crm.html  (the unified CRM; course admin lives embedded inside it)
    - LAD intelligence → lad-crm.html
  Maintaining two copies caused every fix to be made twice. This stub
  redirects bookmarks based on the signed-in user's role.
-->
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:linear-gradient(135deg,#004a2a,#006B3F);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center}
  .wrap{padding:32px}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:32px;letter-spacing:-.014em;margin:0 0 10px}
  p{font-size:13.5px;opacity:.78;margin:0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Opening your portal…</h1>
  <p id="dest">Detecting your role.</p>
</div>
<script>
(function () {
  function safeGet(k) { try { return localStorage.getItem(k) || ''; } catch (_) { return ''; }}
  var role = safeGet('lad_role');
  var hash = (location.hash || '').replace(/^#/, '').toLowerCase();
  var dest;
  // Hash override: lad-super-system.html#firm, #lawyer, #admin, #intel
  if (hash === 'lawyer')          dest = 'lawyer-portal-v2.html';
  else if (hash === 'firm')       dest = 'firm-compliance-portal.html';
  else if (hash === 'admin')      dest = 'lad-crm.html';
  else if (hash === 'intel')      dest = 'lad-crm.html#intel';
  else if (role === 'lawyer')     dest = 'lawyer-portal-v2.html';
  else if (role === 'firm_compliance_officer') dest = 'firm-compliance-portal.html';
  else if (role === 'provider')   dest = 'provider-portal.html';
  else if (role === 'lad_admin' || role === 'super_admin' || role === 'lad_super_admin') dest = 'lad-crm.html';
  else if (role === 'lad_intelligence' || role === 'dg') dest = 'lad-crm.html';
  else                            dest = 'clpd-portal.html'; // not signed in → public landing
  var el = document.getElementById('dest');
  if (el) el.textContent = 'Redirecting to ' + dest + '…';
  setTimeout(function () { location.replace(dest); }, 250);
})();
</script>
</body>
</html>
