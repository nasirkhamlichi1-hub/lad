<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset password · CLPD Portal · Legal Affairs Department, Dubai</title>
<script src="runtime-config.js"></script>
<script src="lad-api-sync.js"></script>
<script src="api-client.js"></script>
<style>
  :root {
    --ink:#0a0e14; --slate:#3a4453; --slate2:#5a6573; --slate3:#8a98aa;
    --paper:#f7f8fa; --paper2:#eef1f5; --white:#fff;
    --line:#e1e6ec; --line2:#cbd3dc;
    --green:#006B3F; --green-d:#004a2a; --green-l:#1c8c5a; --green-bg:#eaf5ef; --green-border:#b9dcca;
    --gold:#C9913A; --gold-l:#e0b162;
    --red:#c0392b; --red-bg:#fbeae8;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    --mono:'JetBrains Mono','SF Mono',Menlo,monospace;
    --arabic:'Noto Naskh Arabic','Amiri',serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(135deg,var(--paper) 0%,#fff 50%,var(--paper) 100%);font-family:var(--sans);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--white);border-radius:24px;box-shadow:0 32px 96px rgba(10,14,20,.16);width:min(100%,460px);overflow:hidden}
  .hd{background:linear-gradient(135deg,var(--green-d),var(--green));padding:22px 26px;color:#fff}
  .hd .ar{font-family:var(--arabic);font-size:11px;color:rgba(201,145,58,.85);direction:rtl;font-weight:600;margin-bottom:3px}
  .hd .t{font-family:var(--serif);font-size:22px;letter-spacing:-.014em}
  .body{padding:24px 26px 28px}
  label{display:block;font-family:var(--mono);font-size:9.5px;color:var(--slate3);letter-spacing:.9px;text-transform:uppercase;font-weight:600;margin-bottom:6px;margin-top:14px}
  label:first-of-type{margin-top:0}
  input[type=password]{width:100%;padding:11px 13px;border:1.5px solid var(--line2);border-radius:10px;font-size:13.5px;font-family:var(--sans);color:var(--ink);outline:none;transition:border-color .15s}
  input[type=password]:focus{border-color:var(--green)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;font-size:13.5px;font-weight:600;border:none;border-radius:10px;cursor:pointer;letter-spacing:-.005em;width:100%;margin-top:18px;background:var(--green);color:#fff;transition:transform .12s}
  .btn:hover{transform:translateY(-1px)}
  .btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
  .meta{font-size:11.5px;color:var(--slate3);margin-top:10px;line-height:1.55}
  .err{background:var(--red-bg);border:1px solid #f3c0b8;color:var(--red);padding:11px 13px;border-radius:9px;font-size:12.5px;margin-bottom:14px;line-height:1.5}
  .ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);padding:11px 13px;border-radius:9px;font-size:12.5px;margin-bottom:14px;line-height:1.5}
  .foot{text-align:center;font-size:12px;color:var(--slate3);margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .foot a{color:var(--green);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="hd">
    <div class="ar">دائرة الشؤون القانونية · حكومة دبي</div>
    <div class="t">Reset your password</div>
  </div>
  <div class="body" id="body">
    <div class="meta" id="tokenInfo" style="margin-bottom:18px">Verifying your reset link…</div>
    <div id="formBox" style="display:none">
      <div id="errBox" class="err" style="display:none"></div>
      <label for="np">NEW PASSWORD</label>
      <input id="np" type="password" autocomplete="new-password" placeholder="Minimum 8 characters" minlength="8" required/>
      <label for="cp">CONFIRM NEW PASSWORD</label>
      <input id="cp" type="password" autocomplete="new-password" placeholder="Type it again" minlength="8" required/>
      <button id="submitBtn" class="btn" onclick="doReset()">Set new password</button>
      <div class="meta">After saving you'll be redirected to sign in with your new password.</div>
    </div>
    <div id="doneBox" style="display:none">
      <div class="ok">Password updated. You can now sign in with your new password.</div>
      <a href="clpd-portal.html" class="btn" style="text-decoration:none">Go to sign-in</a>
    </div>
    <div id="badBox" style="display:none">
      <div class="err" id="badMsg"></div>
      <a href="clpd-portal.html" class="btn" style="background:var(--slate);text-decoration:none">Back to sign-in</a>
    </div>
    <div class="foot">Need help? Contact <a href="mailto:clpd@legal.dubai.gov.ae">clpd@legal.dubai.gov.ae</a></div>
  </div>
</div>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  const tokenInfo = document.getElementById('tokenInfo');
  const formBox = document.getElementById('formBox');
  const badBox = document.getElementById('badBox');
  const badMsg = document.getElementById('badMsg');
  if (!token) {
    tokenInfo.style.display = 'none';
    badMsg.textContent = 'No reset token provided. Please use the link from your email.';
    badBox.style.display = 'block';
    return;
  }
  tokenInfo.textContent = 'Choose a new password. The token in your email is valid for 60 minutes.';
  formBox.style.display = 'block';

  window.doReset = async function () {
    const np = document.getElementById('np').value;
    const cp = document.getElementById('cp').value;
    const err = document.getElementById('errBox');
    err.style.display = 'none';
    if (np.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display='block'; return; }
    if (np !== cp) { err.textContent = 'Passwords do not match.'; err.style.display='block'; return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const base = (window.LAD_API_BASE) || (window.LAD_SYNC && window.LAD_SYNC.base) || '';
      const res = await fetch(base + '/api/v1/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: np }),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        err.textContent = body.error || 'Could not reset password.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set new password';
        return;
      }
      formBox.style.display = 'none';
      document.getElementById('doneBox').style.display = 'block';
      setTimeout(() => { window.location.href = 'clpd-portal.html'; }, 4000);
    } catch (e) {
      err.textContent = 'Network error: ' + (e.message || 'unknown');
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set new password';
    }
  };
})();
</script>
</body>
</html>
