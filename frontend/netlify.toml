# ─────────────────────────────────────────────────────────────────────
# Netlify was a temporary test host and is being RETIRED. The frontend now
# deploys via Azure Static Web Apps (see .github/workflows/azure-swa.yml) and
# the backend runs on Render.
#
# This file's only job is to STOP Netlify from building, deploying, or posting
# deploy-preview comments while the Netlify ↔ GitHub connection is being removed.
# The `ignore` command returns 0, which tells Netlify to cancel/skip every build.
#
# To remove Netlify completely (the part that can't be done from this repo):
#   1. Netlify dashboard → site "legalaffairsmain" → Site configuration →
#      "Delete this site"  (or Build & deploy → Continuous deployment → "Unlink").
#   2. GitHub → repo Settings → Integrations → Applications → Netlify →
#      Configure → remove this repository (or Suspend/Uninstall the app).
# ─────────────────────────────────────────────────────────────────────
[build]
  ignore = "/bin/true"
