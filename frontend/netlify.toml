  status = 301

# ─── Security headers ─────────────────────────────────────────
# All HTML portals carry the same CSP. We allow self + inline (the portals
# rely on inline <style>/<script> blocks), and connect-src must list every
# external endpoint the frontend may call:
#   - the backend API origin (set via runtime-config.js)
#   - Anthropic (only used by AI-powered Artifacts demos; remove if not needed)
# Update connect-src whenever you switch backend hosts.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com https://sdk.morphcast.com https://ai-sdk.morphcast.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob: mediastream:; connect-src 'self' https://*.onrender.com https://*.azurewebsites.net https://api.anthropic.com https://cdn.jsdelivr.net https://unpkg.com https://storage.googleapis.com https://*.anam.ai wss://*.anam.ai https://*.morphcast.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://stg-id.uaepass.ae https://id.uaepass.ae"

# ─── Caching — HTML revalidates fast, images cache long ───────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/lad-config.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
