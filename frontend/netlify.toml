# ─────────────────────────────────────────────────────────────
# LAD CLPD frontend — Netlify config
# Static HTML/CSS/JS served from the root, no build step.
# ─────────────────────────────────────────────────────────────

[build]
  publish = "."

# Explicitly disable ALL post-processing.
# Why: our HTML files are large (lad-super-system.html ~1MB) and contain
# inline scripts/styles. Netlify's html-minifier and asset bundlers
# regularly time out or choke on files this size, producing the dreaded
# "post-processing error". Disabling avoids the failure mode entirely.
# Page-load performance is fine without it — we hand-control caching below.
[build.processing]
  skip_processing = true

[build.processing.html]
  pretty_urls = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false

# ─── Friendly URL aliases ─────────────────────────────────────
[[redirects]]
  from = "/lawyer"
  to = "/lawyer-portal-v2.html"
  status = 301

