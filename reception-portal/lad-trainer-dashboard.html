<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>AI Trainer — Admin Dashboard · CLPD</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#006B3F;--green2:#008549;--green-d:#004d2e;--green-bg:#f0f9f4;--green-border:#b8d8c5;--gold:#C9913A;
--ink:#0a0e14;--slate:#3a4554;--slate2:#5a6878;--slate3:#8a98aa;--line:#e8ecf1;--line2:#d8dfe7;--paper:#f8fafb;--paper2:#f1f4f7;--white:#fff;
--red:#c0392b;--red-bg:#fdeae8;--amber:#92540a;--amber-bg:#fef3e2;--serif:'Instrument Serif',Georgia,serif;--sans:'Inter',system-ui,sans-serif;--r:12px}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.top-in{display:flex;align-items:center;gap:14px;height:62px}
.emblem{width:36px;height:36px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:9px;display:grid;place-items:center}
.emblem svg{width:18px;height:22px}
.brand-t{font-family:var(--serif);font-size:18px}.brand-s{font-family:monospace;font-size:8.5px;color:var(--slate3);letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;border:1px solid var(--line2);background:#fff;color:var(--slate);cursor:pointer}
.btn-pri{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border:0}
.gate{max-width:380px;margin:60px auto;padding:0 24px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 2px 4px rgba(10,14,20,.05);padding:18px}
input{width:100%;padding:10px 12px;border:1.5px solid var(--line2);border-radius:9px;font-size:14px;font-family:var(--sans)}
label{display:block;font-size:12px;font-weight:650;color:var(--slate);margin:0 0 6px}
.err{color:var(--red);font-size:13px;margin-top:8px;display:none}
h1{font-family:var(--serif);font-size:30px;font-weight:400;margin:26px 0 4px}
.sub{color:var(--slate2);margin-bottom:20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px}
.kpi-v{font-family:var(--serif);font-size:34px;line-height:1}.kpi-l{font-size:12px;color:var(--slate2);margin-top:6px;font-weight:600}
.sec{margin-top:26px}.sec h2{font-size:15px;font-weight:700;margin-bottom:12px}
.row{display:grid;grid-template-columns:1fr 280px 70px;gap:12px;align-items:center;padding:10px 0;border-top:1px solid var(--line)}
.row-t{font-size:13.5px;font-weight:600}.row-s{font-size:11.5px;color:var(--slate3)}
.bar{height:9px;background:var(--paper2);border-radius:99px;overflow:hidden}.bar>i{display:block;height:100%;border-radius:99px}
.pillv{font-weight:700;text-align:right;font-size:13px}
.tag{font-family:monospace;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--paper2);color:var(--slate2);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--slate3);padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid var(--line)}
.muted{color:var(--slate3)}
.weak{background:var(--red-bg)}.ok{background:var(--green-bg)}
</style>
</head>
<body>
<header class="top"><div class="wrap top-in">
  <div class="emblem"><svg viewBox="0 0 20 24" fill="none"><path d="M10 1l8 4v6c0 5-3.5 9-8 11-4.5-2-8-6-8-11V5l8-4z" fill="#fff" opacity=".95"/></svg></div>
  <div><div class="brand-t">AI Trainer · Admin</div><div class="brand-s">Dubai Legal Affairs Department</div></div>
  <div class="spacer"></div>
  <button id="refreshBtn" class="btn" style="display:none">↻ Refresh</button>
  <a class="btn" href="ai-trainer-live.html">Open trainer</a>
</div></header>

<div id="gate" class="gate">
  <div class="card">
    <label for="pw">Administrator password</label>
    <input id="pw" type="password" placeholder="ADMIN_PASSWORD" autocomplete="off"/>
    <button id="enterBtn" class="btn btn-pri" style="width:100%;justify-content:center;margin-top:12px">View dashboard</button>
    <div id="gateErr" class="err"></div>
  </div>
</div>

<main id="dash" class="wrap" style="display:none;padding-bottom:60px">
  <h1>Learning analytics</h1>
  <div class="sub" id="dashSub">—</div>
  <div class="sec" id="liveSec"><h2>Live now <span class="muted" id="liveCount" style="font-weight:400"></span></h2><div id="liveList"><div class="muted">Checking for active sessions…</div></div></div>
  <div class="kpis" id="kpis"></div>
  <div class="sec"><h2>Topics that need attention <span class="muted" style="font-weight:400">— lowest engagement / pass rate first</span></h2><div id="topics"></div></div>
  <div class="sec"><h2>Learners</h2><div style="overflow:auto"><table id="learners"><thead><tr><th>Name</th><th>Email</th><th>Lessons done</th><th>Avg engagement</th><th>CPD</th><th>Last active</th></tr></thead><tbody></tbody></table></div></div>
</main>

<script>
(function(){
  var el=function(i){return document.getElementById(i);};
  var PASS='';
  function trToken(){try{return localStorage.getItem('tr_token')||'';}catch(e){return '';}}
  function authQ(){ if(PASS)return 'pass='+encodeURIComponent(PASS); var t=trToken(); return t?('token='+encodeURIComponent(t)):''; }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function pct(n){return Math.round(n||0);}
  function barColor(p){return p>=70?'var(--green2)':p>=50?'var(--gold)':'var(--red)';}

  el('enterBtn').onclick=function(){load(true);};
  el('pw').addEventListener('keydown',function(e){if(e.key==='Enter')load(true);});
  el('refreshBtn').onclick=function(){load(false);};

  function load(fromGate){
    if(fromGate){var pw=el('pw').value;if(!pw){el('gateErr').textContent='Enter the admin password.';el('gateErr').style.display='block';return;}PASS=pw;}
    var q=authQ();
    if(!q){return;}  // no creds yet — wait for the password gate
    el('enterBtn').disabled=true;el('gateErr').style.display='none';
    fetch('/api/trainer-admin?'+q).then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
      .then(function(o){
        el('enterBtn').disabled=false;
        if(!o.ok){ if(fromGate){el('gateErr').textContent=(o.j&&o.j.error)||'Access denied.';el('gateErr').style.display='block';} return; }
        if(PASS){try{localStorage.setItem('tr_admin_pw',PASS);}catch(e){}}
        el('gate').style.display='none';el('dash').style.display='';el('refreshBtn').style.display='';
        render(o.j.learners||[]);
        startLivePoll();
      }).catch(function(){el('enterBtn').disabled=false;if(fromGate){el('gateErr').textContent='Network error.';el('gateErr').style.display='block';}});
  }

  // ── Live now: poll for attendees currently in a session ──────────────
  var livePoll=null;
  function startLivePoll(){ loadLive(); if(livePoll)clearInterval(livePoll); livePoll=setInterval(loadLive,10000); }
  function loadLive(){
    var q=authQ(); if(!q)return;
    fetch('/api/trainer-live?'+q).then(function(r){return r.ok?r.json():null;}).then(function(j){ if(j)renderLive(j.live||[]); }).catch(function(){});
  }
  function fmtT(s){s=s||0;var m=Math.floor(s/60),ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
  function renderLive(live){
    el('liveCount').textContent=live.length?('· '+live.length+' in session'):'';
    if(!live.length){el('liveList').innerHTML='<div class="muted">No active sessions right now.</div>';return;}
    el('liveList').innerHTML=live.map(function(L){
      var op=L.objTotal?Math.round(L.objDone/L.objTotal*100):0;
      var eng=(L.engagement==null)?'—':(L.engagement+'%');
      var over=L.targetMin&&(L.elapsedSec>L.targetMin*60);
      return '<div class="row"><div><div class="row-t">'+esc(L.name||L.email)+' <span class="tag">'+esc(L.mode==='simulation'?'sim':'live')+'</span></div>'+
        '<div class="row-s">'+esc(L.sectionTitle||'')+' · Section '+L.sectionIndex+'/'+L.sectionTotal+
        ' · <span style="'+(over?'color:var(--red);font-weight:700':'')+'">'+fmtT(L.elapsedSec)+' / '+L.targetMin+'m</span> · '+eng+' engagement</div></div>'+
        '<div class="bar"><i style="width:'+op+'%;background:'+barColor(op)+'"></i></div>'+
        '<div class="pillv" style="color:'+barColor(op)+'">'+L.objDone+'/'+L.objTotal+'</div></div>';
    }).join('');
  }

  function render(learners){
    // aggregate
    var totLessons=0,engSum=0,engN=0,passN=0,attN=0,cpd=0;
    var topics={}; // title -> {eng:[],pass:0,att:0,learners:0}
    learners.forEach(function(L){
      cpd+=L.cpdTotal||0;
      (L.lessons||[]).forEach(function(x){
        totLessons++; attN++; if(x.pass)passN++;
        engSum+=x.bestEngagement||0; engN++;
        var t=x.title||'(untitled)';
        if(!topics[t])topics[t]={eng:0,n:0,pass:0,att:0};
        topics[t].eng+=x.bestEngagement||0;topics[t].n++;topics[t].att++;if(x.pass)topics[t].pass++;
      });
    });
    var avgEng=engN?engSum/engN:0, passRate=attN?passN/attN*100:0;
    el('dashSub').textContent=learners.length+' learner'+(learners.length===1?'':'s')+' · '+totLessons+' sessions recorded';
    el('kpis').innerHTML=[
      ['Learners',learners.length],
      ['Sessions',totLessons],
      ['Avg engagement',pct(avgEng)+'%'],
      ['Pass rate',pct(passRate)+'%']
    ].map(function(k){return '<div class="kpi"><div class="kpi-v">'+k[1]+'</div><div class="kpi-l">'+k[0]+'</div></div>';}).join('');

    // topics, weakest first
    var tl=Object.keys(topics).map(function(t){var o=topics[t];return {title:t,avg:o.n?o.eng/o.n:0,passRate:o.att?o.pass/o.att*100:0,n:o.n};});
    tl.sort(function(a,b){return (a.avg+a.passRate)-(b.avg+b.passRate);});
    el('topics').innerHTML=tl.length?tl.map(function(t){
      var p=pct(t.avg);
      return '<div class="row"><div><div class="row-t">'+esc(t.title)+'</div><div class="row-s">'+t.n+' attempt'+(t.n===1?'':'s')+' · '+pct(t.passRate)+'% pass</div></div>'+
        '<div class="bar"><i style="width:'+p+'%;background:'+barColor(p)+'"></i></div>'+
        '<div class="pillv" style="color:'+barColor(p)+'">'+p+'%</div></div>';
    }).join(''):'<div class="muted">No sessions recorded yet.</div>';

    // learners
    var tb=el('learners').querySelector('tbody');
    learners.sort(function(a,b){return (b.updated||'').localeCompare(a.updated||'');});
    tb.innerHTML=learners.map(function(L){
      var le=(L.lessons||[]),avg=le.length?le.reduce(function(s,x){return s+(x.bestEngagement||0);},0)/le.length:0;
      var when=L.updated?new Date(L.updated).toLocaleString():'—';
      return '<tr><td><b>'+esc(L.name||'—')+'</b></td><td class="muted">'+esc(L.email||'')+'</td><td>'+(L.completedCount||0)+'</td>'+
        '<td><span style="color:'+barColor(pct(avg))+';font-weight:700">'+pct(avg)+'%</span></td><td>'+(L.cpdTotal||0)+'</td><td class="muted">'+esc(when)+'</td></tr>';
    }).join('')||'<tr><td colspan="6" class="muted">No learners yet.</td></tr>';
  }

  // Boot: try the super-admin's trainer token (or a saved admin password) first;
  // if neither works, the password gate stays for ADMIN_PASSWORD users.
  try{var saved=localStorage.getItem('tr_admin_pw');if(saved){PASS=saved;el('pw').value=saved;}}catch(e){}
  load(false);
})();
</script>
</body>
</html>
