<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1000" viewBox="0 0 1180 1000" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#5a6573"/></marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#c0392b"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#006B3F"/></marker>
    <style>
      .t{font-size:14px;font-weight:600;fill:#14202b}
      .s{font-size:11px;fill:#5a6573}
      .lbl{font-size:11px;font-weight:700;fill:#5a6573;letter-spacing:1.2px}
      .ec{font-size:10.5px;font-weight:700;letter-spacing:1px}
    </style>
  </defs>

  <rect width="1180" height="1000" fill="#f7f8fa"/>
  <rect x="0" y="0" width="1180" height="56" fill="#006B3F"/>
  <text x="32" y="35" fill="#fff" font-size="20" font-weight="700">CLPD Accreditation — Process Map</text>
  <text x="1148" y="35" fill="#bfe3cf" font-size="11" text-anchor="end" font-family="monospace">Government of Dubai · Legal Affairs Department</text>

  <text x="40" y="120" class="lbl">SUBMIT</text>
  <text x="40" y="300" class="lbl">REVIEW</text>
  <text x="40" y="540" class="lbl">DECISION</text>
  <text x="40" y="660" class="lbl">GO-LIVE</text>

  <rect x="240" y="92" width="400" height="62" rx="11" fill="#e8f3ee" stroke="#006B3F"/>
  <text x="440" y="118" text-anchor="middle" class="t">Provider or firm submits an application</text>
  <text x="440" y="138" text-anchor="middle" class="s">materials · learning objectives · audience · attachments</text>

  <rect x="240" y="184" width="400" height="62" rx="11" fill="#e8f3ee" stroke="#006B3F"/>
  <text x="440" y="210" text-anchor="middle" class="t">Enters the LAD review queue — PENDING</text>
  <text x="440" y="230" text-anchor="middle" class="s">classified as Course/Activity or Provider/Entity</text>

  <rect x="240" y="276" width="400" height="62" rx="11" fill="#e3f1f0" stroke="#0d7377"/>
  <text x="440" y="302" text-anchor="middle" class="t">Two LAD reviewers assigned — R1 &amp; R2</text>
  <text x="440" y="322" text-anchor="middle" class="s">intelligence + super tier · plus Lex AI as a third reviewer</text>

  <rect x="180" y="368" width="520" height="116" rx="11" fill="#e3f1f0" stroke="#0d7377"/>
  <text x="440" y="392" text-anchor="middle" class="t">Each reviewer scores the rubric — pass &#8805; 70% per section</text>
  <rect x="196" y="404" width="244" height="66" rx="8" fill="#fff" stroke="#cbd3dc"/>
  <text x="318" y="424" text-anchor="middle" class="ec" fill="#0d7377">COURSE / ACTIVITY</text>
  <text x="318" y="442" text-anchor="middle" class="s">Activity Review · 5 criteria 0-4</text>
  <text x="318" y="458" text-anchor="middle" class="s">+ Trainer Review · 4 criteria 0-5</text>
  <rect x="448" y="404" width="236" height="66" rx="8" fill="#fff" stroke="#cbd3dc"/>
  <text x="566" y="424" text-anchor="middle" class="ec" fill="#9a6cff">PROVIDER / ENTITY</text>
  <text x="566" y="442" text-anchor="middle" class="s">Entity Review · 8 criteria</text>
  <text x="566" y="458" text-anchor="middle" class="s">max 20 · institutional capability</text>

  <polygon points="440,512 575,565 440,618 305,565" fill="#faf2e2" stroke="#C9913A"/>
  <text x="440" y="560" text-anchor="middle" class="t" font-size="13">Both reviews &#8805; 70%</text>
  <text x="440" y="578" text-anchor="middle" class="t" font-size="13">in every section?</text>

  <text x="455" y="648" class="ec" fill="#006B3F">YES</text>
  <rect x="240" y="660" width="400" height="50" rx="11" fill="#dff0e6" stroke="#006B3F"/>
  <text x="440" y="690" text-anchor="middle" class="t">Approved — accreditation code issued</text>

  <rect x="240" y="728" width="400" height="46" rx="11" fill="#dff0e6" stroke="#006B3F"/>
  <text x="440" y="756" text-anchor="middle" class="t">Course published to the catalogue — bookable</text>

  <rect x="240" y="792" width="400" height="46" rx="11" fill="#dff0e6" stroke="#006B3F"/>
  <text x="440" y="820" text-anchor="middle" class="t">Lawyers book &amp; attend sessions</text>

  <rect x="240" y="856" width="400" height="46" rx="11" fill="#006B3F"/>
  <text x="440" y="884" text-anchor="middle" class="t" fill="#fff">Attendance filed &#8594; CPD points awarded</text>

  <text x="600" y="556" class="ec" fill="#c0392b">NO</text>
  <rect x="720" y="500" width="400" height="64" rx="11" fill="#fdeceb" stroke="#c0392b"/>
  <text x="920" y="526" text-anchor="middle" class="t">Request changes</text>
  <text x="920" y="546" text-anchor="middle" class="s">returns to the provider to revise &amp; resubmit</text>
  <rect x="720" y="576" width="194" height="44" rx="11" fill="#fdeceb" stroke="#c0392b"/>
  <text x="817" y="603" text-anchor="middle" class="t">Reject</text>
  <rect x="926" y="576" width="194" height="44" rx="11" fill="#faf2e2" stroke="#C9913A"/>
  <text x="1023" y="603" text-anchor="middle" class="t">Defer to DG</text>

  <line x1="440" y1="154" x2="440" y2="182" stroke="#5a6573" marker-end="url(#arr)"/>
  <line x1="440" y1="246" x2="440" y2="274" stroke="#5a6573" marker-end="url(#arr)"/>
  <line x1="440" y1="338" x2="440" y2="366" stroke="#5a6573" marker-end="url(#arr)"/>
  <line x1="440" y1="484" x2="440" y2="510" stroke="#5a6573" marker-end="url(#arr)"/>
  <line x1="440" y1="618" x2="440" y2="658" stroke="#006B3F" marker-end="url(#arrG)"/>
  <line x1="440" y1="710" x2="440" y2="726" stroke="#006B3F" marker-end="url(#arrG)"/>
  <line x1="440" y1="774" x2="440" y2="790" stroke="#006B3F" marker-end="url(#arrG)"/>
  <line x1="440" y1="838" x2="440" y2="854" stroke="#006B3F" marker-end="url(#arrG)"/>

  <line x1="575" y1="565" x2="718" y2="532" stroke="#c0392b" marker-end="url(#arrR)"/>
  <path d="M720,520 C660,470 660,150 642,123" fill="none" stroke="#c0392b" stroke-dasharray="5 4" marker-end="url(#arrR)"/>
</svg>
