name: frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  validate:
    name: smoke-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML balance + size check
        run: |
          cd frontend
          # All HTML files must have balanced <section> and <div class="page"> tags
          fail=0
          for f in *.html; do
            open=$(grep -c '<section' "$f" || true)
            close=$(grep -c '</section>' "$f" || true)
            if [ "$open" != "$close" ]; then
              echo "::error file=frontend/$f::section tags unbalanced (open=$open close=$close)"
              fail=1
            fi
            # Warn if any HTML file looks suspiciously small (deleted/truncated)
            size=$(wc -c < "$f")
            if [ "$size" -lt 500 ]; then
              echo "::warning file=frontend/$f::file is unusually small (${size} bytes)"
            fi
          done
          exit $fail

      - name: index.html mirrors clpd-portal.html
        run: |
          cd frontend
          if ! diff -q index.html clpd-portal.html > /dev/null; then
            echo "::error::index.html and clpd-portal.html are out of sync — copy clpd-portal.html → index.html"
            exit 1
          fi

  deploy:
    name: deploy to Netlify
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./frontend
          production-branch: main
          production-deploy: true
          deploy-message: ${{ github.event.head_commit.message }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
