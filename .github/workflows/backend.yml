name: backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to GHCR
  id-token: write   # required for Azure OIDC (federated) login

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/lad-clpd-backend

jobs:
  ci:
    name: lint & boot-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Validate env (dev mode — should only warn)
        working-directory: backend
        run: node -e "require('./src/validateEnv').validateEnv()"

      - name: Boot smoke-test
        working-directory: backend
        env:
          NODE_ENV: development
          JWT_SECRET: ci-test-secret-not-for-production-use-only-32+chars
          DATABASE_URL: ./data/ci.sqlite
        run: |
          mkdir -p data
          node scripts/migrate.js
          # Start, hit /health, kill
          node src/server.js & PID=$!
          sleep 3
          curl -fsS http://localhost:4000/api/v1/health | tee /dev/stderr | grep -q '"status":"ok"'
          kill $PID

  build:
    name: build & push image
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Two tags: a stable "latest" plus the commit SHA for traceability
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        run: |
          echo "Pushed:"
          echo "  ${{ env.IMAGE_NAME }}:latest"
          echo "  ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Pull on your host:"
          echo "  docker pull ${{ env.IMAGE_NAME }}:latest"

  deploy:
    name: deploy to Azure App Service
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # OIDC (federated) login — no stored credentials. Set these as repo
      # secrets/variables to enable auto-deploy; the job skips cleanly if absent.
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_WEBAPP_NAME:     ${{ vars.AZURE_WEBAPP_NAME || 'clpd-lad-api-0878' }}
      AZURE_RESOURCE_GROUP:  ${{ vars.AZURE_RESOURCE_GROUP }}
    steps:
      - name: Check deploy config
        id: cfg
        run: |
          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-deploy skipped — set AZURE_CLIENT_ID, AZURE_TENANT_ID and AZURE_SUBSCRIPTION_ID (OIDC) to enable container deploys."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC — no stored secret)
        if: steps.cfg.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set container image + restart (ARM, no basic auth needed)
        if: steps.cfg.outputs.ready == 'true'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            APP="$AZURE_WEBAPP_NAME"
            RG="$AZURE_RESOURCE_GROUP"
            if [ -z "$RG" ]; then
              RG=$(az webapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv)
            fi
            if [ -z "$RG" ]; then echo "::error::Could not resolve the resource group for $APP — set the AZURE_RESOURCE_GROUP repo variable."; exit 1; fi
            echo "Deploying ${IMAGE_NAME}:${GITHUB_SHA} to $APP (resource group: $RG)"
            az webapp config container set \
              --name "$APP" --resource-group "$RG" \
              --container-image-name "${IMAGE_NAME}:${GITHUB_SHA}"
            az webapp restart --name "$APP" --resource-group "$RG"
            echo "Deployed. Health: https://$APP.azurewebsites.net/api/v1/health"
