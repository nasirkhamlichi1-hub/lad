name: backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to GHCR

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/lad-clpd-backend

jobs:
  ci:
    name: lint & boot-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Validate env (dev mode — should only warn)
        working-directory: backend
        run: node -e "require('./src/validateEnv').validateEnv()"

      - name: Boot smoke-test
        working-directory: backend
        env:
          NODE_ENV: development
          JWT_SECRET: ci-test-secret-not-for-production-use-only-32+chars
          DATABASE_URL: ./data/ci.sqlite
        run: |
          mkdir -p data
          node scripts/migrate.js
          # Start, hit /health, kill
          node src/server.js & PID=$!
          sleep 3
          curl -fsS http://localhost:4000/api/v1/health | tee /dev/stderr | grep -q '"status":"ok"'
          kill $PID

  build:
    name: build & push image
    needs: ci
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Two tags: a stable "latest" plus the commit SHA for traceability
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        run: |
          echo "Pushed:"
          echo "  ${{ env.IMAGE_NAME }}:latest"
          echo "  ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "Pull on your host:"
          echo "  docker pull ${{ env.IMAGE_NAME }}:latest"

  deploy:
    name: deploy to Azure App Service
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
    steps:
      - name: Check deploy config
        id: cfg
        run: |
          if [ -z "$PUBLISH_PROFILE" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-deploy skipped — add the AZURE_WEBAPP_PUBLISH_PROFILE secret to deploy automatically."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy container image to the Web App
        if: steps.cfg.outputs.ready == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME || 'clpd-lad-api-0878' }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy summary
        if: steps.cfg.outputs.ready == 'true'
        run: |
          echo "Deployed ${{ env.IMAGE_NAME }}:${{ github.sha }} to ${{ vars.AZURE_WEBAPP_NAME || 'clpd-lad-api-0878' }}"
          echo "Health: https://${{ vars.AZURE_WEBAPP_NAME || 'clpd-lad-api-0878' }}.azurewebsites.net/api/v1/health"
