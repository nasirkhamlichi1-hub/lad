name: Azure Static Web Apps CI/CD (Academy)

# Manual-only until the AZURE_STATIC_WEB_APPS_API_TOKEN_ACADEMY secret is set, so it
# doesn't fail automatically on every push. Run it from the Actions tab on demand,
# then switch to a push trigger once the token is configured. See academy/SETUP-LOGIN.md.
on:
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ACADEMY }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "academy"        # App source code path
          api_location: "academy/api"    # Progress-tracking functions
          output_location: ""            # No build step
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ACADEMY }}
          action: "close"
