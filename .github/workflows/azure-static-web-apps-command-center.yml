name: Azure Static Web Apps CI/CD (Command Center)

on:
  push:
    branches:
      - claude/jolly-mendel-yihc4d
    paths:
      - "command-center/**"
      - ".github/workflows/azure-static-web-apps-command-center.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - claude/jolly-mendel-yihc4d

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_COMMAND_CENTER }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "command-center"     # App source code path
          api_location: "command-center/api"  # Api (analyst function) source path
          output_location: ""                 # No build step
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_COMMAND_CENTER }}
          action: "close"
